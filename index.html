    <script>
// [추가] 통합 알림용 변수
let groupingTimer = null;
let nameBuffer = [];
let currentTarget = "";

function lhy_notifyGroup(name, targetName) {
    // 1. 타겟이 바뀌면 이전 그룹 즉시 처리
    if (currentTarget !== targetName && nameBuffer.length > 0) {
        processAlert();
    }
    
    // 2. 현재 타겟 설정 및 이름 추가
    currentTarget = targetName;
    if (!nameBuffer.includes(name)) nameBuffer.push(name);
    
    // 3. 0.1초 동안 추가 입력이 있는지 대기 (매우 짧아서 즉시처럼 느껴짐)
    clearTimeout(groupingTimer);
    groupingTimer = setTimeout(() => {
        processAlert();
    }, 100); 
}

function processAlert() {
    if (nameBuffer.length === 0) return;
    
    const names = nameBuffer.join(", ");
    const msg = `${names}님${nameBuffer.length > 1 ? '들' : ''}이 ${currentTarget}에 배정되었습니다.`;
    
    lhy_notify(msg); // 기존 알림 함수 호출
    
    // 초기화
    nameBuffer = [];
    currentTarget = "";
}

// [추가] 딩동 소리 3회 재생 함수
function lhy_playDingDongSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, duration, time) => {
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }, time);
    };
    
    // 딩동~ 3번 (딩 880Hz, 동 659Hz)
    for(let i=0; i<3; i++) {
        playTone(880, 0.3, i * 1000);     // 딩
        playTone(659, 0.3, i * 1000 + 400); // 동
    }
}

// [추가] 특정 멤버 네온사인 활성화 함수
function lhy_triggerMemberEffect(memberId) {
    const playerEl = document.querySelector(`.player[data-id="${memberId}"]`);
    if (playerEl) {
        playerEl.classList.add('neon-active');
        setTimeout(() => playerEl.classList.remove('neon-active'), 5000); // 5초간 반짝임
    }
}

// [수정] 알림 통합 관리 함수 (lhy_dominoShiftSystem 등의 호출부에서 사용)
function lhy_triggerAlertEvent(memberIds) {
    if (!Array.isArray(memberIds)) memberIds = [memberIds];
    
    // 1. 소리 재생
    lhy_playDingDongSound();
    
    // 2. 해당 멤버들 네온사인 효과 적용
    memberIds.forEach(id => lhy_triggerMemberEffect(id));
}
    function checkPassword() {
        const input = document.getElementById('pw-input').value;
        if (input === "12") { 
            document.getElementById('auth-gate').style.display = 'none';
            lhy_safeLockOrientation(); 
        } else { alert("비밀번호가 틀렸습니다."); }
    }
    
    function lhy_safeLockOrientation() {
        try {
            if (screen.orientation && typeof screen.orientation.lock === 'function') {
                screen.orientation.lock('landscape').catch(() => {});
            }
        } catch (e) {}
    }

        try { return fn(); } catch(e) { console.error("오류 발생:", e); }
    }

// ==========================================
    // 💡 [핵심] 1. 전역 동기화 (Firebase 업데이트) - 강력한 안전망 추가
    // ==========================================
    function lhy_syncToFirebase() {
        isSyncing = true;
        
        // 1. 보드판의 undefined 방지 (빈칸은 반드시 null로 안전하게 치환)
        let safeBoardState = {};
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        for(let i=1; i<=6; i++) {
            posOrder.forEach(p => {
                // 값이 undefined면 강제로 null을 대입하여 에러 차단
                safeBoardState[`c${i}-${p}`] = boardState[`c${i}-${p}`] || null;
                safeBoardState[`w${i}-${p}`] = boardState[`w${i}-${p}`] || null;
            });
        }

        // 2. DB 내부의 undefined(예: attTime 등)를 깔끔하게 제거하는 마법의 코드
        const safeDB = JSON.parse(JSON.stringify(DB));

        // 3. 안전하게 정제된 데이터만 Firebase로 전송
        database.ref('appData').set({
            DB: safeDB,
            boardState: safeBoardState
        }).then(() => {
            isSyncing = false;
        }).catch(error => {
            console.error("Firebase 저장 에러:", error);
            isSyncing = false;
        });
    }

    // ==========================================
    // 💡 [핵심] 3. 글로벌 음성/팝업 알림 (Firebase 연동)
    // ==========================================
    function sendGlobalNotify(msg) {
        database.ref('logs').push({ msg: msg, time: firebase.database.ServerValue.TIMESTAMP });
    }

    function initGlobalNotifications() {
        let isFirstLoad = true;
        database.ref('logs').limitToLast(1).on('child_added', (snapshot) => {
            if (isFirstLoad) return; 
            const log = snapshot.val();
            if (log && log.msg && (Date.now() - log.time < 10000)) { 
                lhy_notify(log.msg);
            }
        });
        setTimeout(() => { isFirstLoad = false; }, 2000);
    }

    function getAreaName(areaId) {
        if (areaId.startsWith('c')) return `코트 ${areaId.replace('c','')}`;
        if (areaId.startsWith('w')) return `대기 ${areaId.replace('w','')}`;
        return areaId;
    }

    // --- 동적 드래그 버튼 위치 업데이트 ---
    function lhy_updateGroupDragBtnPosition() {
        const selectedEls = document.querySelectorAll('.player.is-sel');
        let btn = document.getElementById('dynamic-drag-btn');

        if (selectedEls.length < 2) {
            if (btn) btn.remove();
            return;
        }

        if (!btn) {
            btn = document.createElement('div');
            btn.id = 'dynamic-drag-btn';
            btn.className = 'dynamic-drag-btn';
            btn.innerHTML = '🖐';
            document.body.appendChild(btn);
        }

        let sumX = 0, sumY = 0;
        selectedEls.forEach(el => {
            const rect = el.getBoundingClientRect();
            sumX += rect.left + (rect.width / 2);
            sumY += rect.top + (rect.height / 2);
        });

        btn.style.left = (sumX / selectedEls.length) + 'px';
        btn.style.top = (sumY / selectedEls.length) + 'px';
        btn.style.transform = 'translate(-50%, -50%)';
    }

    // --- 이벤트 위임 기반 드래그 앤 드롭 함수 ---
    function initGroupDragEvents() {
        let isDragging = false;
        let btn = null;
        let initialX, initialY;
        let offsetX = 0, offsetY = 0;

        const handleStart = (e) => {
            const target = e.target.closest('#dynamic-drag-btn');
            if (!target) return;

            isDragging = true;
            isListDragging = true;
            btn = target;
            
            const touch = e.touches ? e.touches[0] : e;
            initialX = touch.clientX;
            initialY = touch.clientY;
            
            const rect = btn.getBoundingClientRect();
            offsetX = touch.clientX - rect.left - (rect.width / 2); 
            offsetY = touch.clientY - rect.top - (rect.height / 2);

            btn.classList.add('active');
        };

        const handleMove = (e) => {
            if (!isDragging || !btn) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            
            btn.style.left = (touch.clientX - offsetX) + 'px';
            btn.style.top = (touch.clientY - offsetY) + 'px';
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            isListDragging = false;
            
            if (btn) {
                btn.classList.remove('active');
                btn.style.display = 'none';
                
                const touch = e.changedTouches ? e.changedTouches[0] : e;
                const clientX = touch ? touch.clientX : 0;
                const clientY = touch ? touch.clientY : 0;
                
                const targetEl = document.elementFromPoint(clientX, clientY);
                btn.style.display = 'flex';
                
                const unitEl = targetEl ? targetEl.closest('.lhy-unit') : null;
                
                if (unitEl) {
                    const unitName = unitEl.id.replace('unit-', '');
                    const emptySlots = Object.keys(boardState).filter(key => 
                        key.includes(unitName) && boardState[key] === null
                    );

                    if (emptySlots.length >= selectedPopIds.length) {
                        lhy_saveUndoState();

                        Object.keys(boardState).forEach(key => {
                            if (selectedPopIds.includes(boardState[key])) {
                                boardState[key] = null;
                            }
                        });

                        selectedPopIds.forEach((id, index) => {
                            boardState[emptySlots[index]] = id;
                        });

                        selectedPopIds.forEach(id => {
                            const member = DB.members.find(m => m.id === id);
                            if (member) {
                                member.isAtt = true;
                                if (!member.attTime) member.attTime = Date.now();
                            }
                        });

                        lhy_syncToFirebase();

                        selectedPopIds = [];
                        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
                        
                        lhy_renderBoardFromState();
                        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (err) {}
                        
                        if(typeof lhy_dominoShiftSystem === 'function') lhy_dominoShiftSystem();
                        
                        btn.remove();
                    } else {
                        alert("배치할 빈 자리가 부족합니다.");
                    }
                }
                lhy_updateGroupDragBtnPosition();
            }
        };

        document.addEventListener('mousedown', handleStart);
        document.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('mousemove', handleMove, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchend', handleEnd);
    }

        if (!confirm("현재 회원 명단을 CSV 파일로 내보내시겠습니까?")) return;
        let csvContent = "이름,성별,나이,등급,입회날짜\n";

    function lhy_importMembers(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (!confirm("불러오기를 진행하면 현재 명단이 교체됩니다. 계속하시겠습니까?")) { event.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n');
            let newMembers = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const cols = rows[i].split(',');
                if (cols.length < 5) continue;
                const name = cols[0].replace(/"/g, '');
                const sex = cols[1]; const age = cols[2]; const grade = cols[3]; const joinDate = cols[4];
                newMembers.push({
                    id: 'p' + Date.now() + Math.random().toString(36).substr(2, 5),
                    name: (sex === '여' && !name.includes('여')) ? `${name}(여)` : name,
                    sex: sex, age: age, grade: grade, joinDate: joinDate, isAtt: false, cnt: 0, win: 0, lose: 0, isG: false
                });
            }
            DB.members = newMembers;
            lhy_renderMasterTable();
            lhy_syncToFirebase();
            alert("명단을 성공적으로 불러왔습니다.");
            event.target.value = '';
        };
        reader.readAsText(file, 'utf-8');
    }

    function lhy_pickAndPlace4(pool, boardPrefix) {
        let rule = (DB.config && DB.config.matchRule) ? DB.config.matchRule : 'grade';
        if (pool.length < 4) return false;
        function getGVal(g) { if(!g) return 0; let c = g.charAt(0).toUpperCase(); return {'A':4, 'B':3, 'C':2, 'D':1}[c] || 0; }

        let p1 = pool[0], p2 = pool[1], p3 = pool[2], p4 = pool[3]; let selected = [p1, p2, p3, p4];
        let cases = [ { t1: [p1, p2], t2: [p3, p4] }, { t1: [p1, p3], t2: [p2, p4] }, { t1: [p1, p4], t2: [p2, p3] } ];
        let bestCase = null; let minPenalty = Infinity;

        cases.forEach(c => {
            let historyPenalty = lhy_getMatchScore(c.t1[0].id, c.t1[1].id) + lhy_getMatchScore(c.t2[0].id, c.t2[1].id);
            let t1Score = getGVal(c.t1[0].grade) + getGVal(c.t1[1].grade); let t2Score = getGVal(c.t2[0].grade) + getGVal(c.t2[1].grade);
            let balancePenalty = Math.abs(t1Score - t2Score);
            let totalPenalty = (rule === 'grade') ? (balancePenalty * 100) + historyPenalty : (historyPenalty * 100) + balancePenalty;
            if (totalPenalty < minPenalty) { minPenalty = totalPenalty; bestCase = c; }
        });

        boardState[`${boardPrefix}-L1`] = bestCase.t1[0].id; boardState[`${boardPrefix}-L2`] = bestCase.t1[1].id;
        boardState[`${boardPrefix}-R1`] = bestCase.t2[0].id; boardState[`${boardPrefix}-R2`] = bestCase.t2[1].id;
        
        // 배정 글로벌 알림
selected.forEach(m => { sendGlobalNotify(`${m.name}님 ${getAreaName(boardPrefix)}에 배정되었습니다.`); });
        
        lhy_addMatchHistory(bestCase.t1[0].id, bestCase.t1[1].id); lhy_addMatchHistory(bestCase.t2[0].id, bestCase.t2[1].id);
        
        let selectedIds = selected.map(p => p.id);
        for (let i = pool.length - 1; i >= 0; i--) { if (selectedIds.includes(pool[i].id)) { pool.splice(i, 1); } }
        return true;
    }

    function lhy_getSortedPool() {
        let playingIds = Object.values(boardState).filter(id => id !== null);
        let pool = DB.members.filter(m => m.isAtt && !playingIds.includes(m.id));
        pool.sort((a, b) => {
            if ((a.attTime || 0) !== (b.attTime || 0)) return (a.attTime || 0) - (b.attTime || 0); 
            if ((a.cnt || 0) !== (b.cnt || 0)) return (a.cnt || 0) - (b.cnt || 0); 
            return a.name.localeCompare(b.name, 'ko');
        });
        return pool;
    }

    function lhy_extractFirstFromWaitlist() {
        for (let w = 1; w <= 6; w++) {
            if (DB.config.w[w-1]) {
                for (let p of posOrder) {
                    let id = boardState[`w${w}-${p}`];
                    if (id) { boardState[`w${w}-${p}`] = null; return id; }
                }
            }
        }
        return null;
    }

    function lhy_rebuildTeam(idsArr, boardPrefix) {
        posOrder.forEach(p => boardState[`${boardPrefix}-${p}`] = null);
        if(idsArr.length < 4) { idsArr.forEach((id, idx) => { boardState[`${boardPrefix}-${posOrder[idx]}`] = id; }); return; }
        let poolObjects = idsArr.map(id => DB.members.find(m => m.id === id)).filter(m => m !== undefined);
        if(poolObjects.length === 4) { lhy_pickAndPlace4(poolObjects, boardPrefix); }
    }

    function lhy_rotationalMatchEngine() {
        let shiftedAny = false;
        // 1. 대기 팀 -> 코트 이동 로직
        for (let i = 1; i <= 6; i++) {
            if (DB.config.c[i-1]) {
                let isCourtEmpty = posOrder.every(p => boardState[`c${i}-${p}`] === null);
                if (isCourtEmpty) {
                    for (let w = 1; w <= 6; w++) {
                        if (DB.config.w[w-1]) {
                            let waitCount = posOrder.filter(p => boardState[`w${w}-${p}`] !== null).length;
                            if (waitCount === 4) { 
                                posOrder.forEach(p => {
                                    const memberId = boardState[`w${w}-${p}`];
                                    boardState[`c${i}-${p}`] = memberId;
                                    boardState[`w${w}-${p}`] = null;
                                    if (memberId) {
                                        const m = DB.members.find(x => x.id === memberId);
                                        if (m) sendGlobalNotify(`${m.name}님 코트 ${i}에 배정되었습니다.`);
                                    }
                                });
                                shiftedAny = true; break;
                            }
                        }
                    }
                }
            }
        }
        
        if (shiftedAny) { lhy_compactWaitSlots(); }

        // 2. 부분 팀 채우기 로직 (코트)
        for (let i = 1; i <= 6; i++) {
            if (DB.config.c[i-1]) {
                let cIds = posOrder.map(p => boardState[`c${i}-${p}`]).filter(id => id !== null);
                if (cIds.length > 0 && cIds.length < 4) {
                    let needed = 4 - cIds.length;
                    for(let k=0; k<needed; k++) {
                        let waitId = lhy_extractFirstFromWaitlist();
                        if(waitId) { cIds.push(waitId); } 
                        else { let pool = lhy_getSortedPool(); if(pool.length > 0) cIds.push(pool.shift().id); }
                    }
                    lhy_rebuildTeam(cIds, `c${i}`);
                }
            }
        }

        lhy_compactWaitSlots();

        // 3. 부분 팀 채우기 로직 (대기)
        for (let w = 1; w <= 6; w++) {
            if (DB.config.w[w-1]) {
                let wIds = posOrder.map(p => boardState[`w${w}-${p}`]).filter(id => id !== null);
                if (wIds.length > 0 && wIds.length < 4) {
                    let needed = 4 - wIds.length;
                    for(let k=0; k<needed; k++) {
                        let pool = lhy_getSortedPool();
                        if(pool.length > 0) wIds.push(pool.shift().id);
                    }
                    lhy_rebuildTeam(wIds, `w${w}`);
                }
            }
        }

        // 4. 빈 곳 채우기
        let pool = lhy_getSortedPool(); 
        const allAreas = [
            ...[1,2,3,4,5,6].map(i => ({ id: `c${i}`, active: DB.config.c[i-1] })),
            ...[1,2,3,4,5,6].map(i => ({ id: `w${i}`, active: DB.config.w[i-1] }))
        ];

        allAreas.forEach(area => {
            if (area.active) {
                let isEmpty = posOrder.every(p => boardState[`${area.id}-${p}`] === null);
                if (isEmpty && pool.length >= 4) { lhy_pickAndPlace4(pool, area.id); }
            }
        });
        
        lhy_renderBoardFromState(); lhy_updateResetButtonUI(); lhy_applyOrientationLogic();
        lhy_syncToFirebase();
    }

    function lhy_fnGameEnd(type, idx, winner) {
        if (type !== 'c') return;
        lhy_saveUndoState();
        
        let pL1 = boardState[`c${idx}-L1`]; let pL2 = boardState[`c${idx}-L2`]; let pR1 = boardState[`c${idx}-R1`]; let pR2 = boardState[`c${idx}-R2`];
        let aTeam = [pL1, pL2].filter(id => id); let bTeam = [pR1, pR2].filter(id => id);

        if (winner === 'A') {
            aTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.win = (m.win||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
            bTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.lose = (m.lose||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
        } else if (winner === 'B') {
            aTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.lose = (m.lose||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
            bTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.win = (m.win||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
        }

        posOrder.forEach(p => { boardState[`c${idx}-${p}`] = null; });
        lhy_dominoShiftSystem();
    }

    function lhy_compactWaitSlots() {
        let activeWaitTeams = [];
        for (let i = 1; i <= 6; i++) {
            if (DB.config.w[i - 1]) {
                let team = posOrder.map(p => boardState[`w${i}-${p}`]);
                if (team.some(id => id !== null)) { activeWaitTeams.push(team); }
                posOrder.forEach(p => { boardState[`w${i}-${p}`] = null; });
            }
        }
        let slotIdx = 1;
        activeWaitTeams.forEach(team => {
            while (slotIdx <= 6 && !DB.config.w[slotIdx - 1]) { slotIdx++; }
            if (slotIdx <= 6) { posOrder.forEach((p, idx) => { boardState[`w${slotIdx}-${p}`] = team[idx]; }); slotIdx++; }
        });
    }

    function lhy_syncBoardDOMToState() {
        const seenIds = new Set(); 
        for (let i = 1; i <= 6; i++) {
            posOrder.forEach(p => {
                ['c', 'w'].forEach(t => {
                    const slot = document.getElementById(`${t}${i}-${p}`);
                    if (slot && slot.children.length > 0) { 
                        const pid = slot.children[0].dataset.id;
                        if (seenIds.has(pid)) { slot.innerHTML = ''; boardState[`${t}${i}-${p}`] = null; } 
                        else { seenIds.add(pid); boardState[`${t}${i}-${p}`] = pid; }
                    } else { boardState[`${t}${i}-${p}`] = null; }
                });
            });
        }
        lhy_renderBoardFromState();
        const assignedIds = Object.values(boardState).filter(id => id !== null);
        const playerList = document.getElementById('player-list');
        if (playerList) {
            Array.from(playerList.children).forEach(el => {
                const pid = el.dataset.id; el.style.display = assignedIds.includes(pid) ? 'none' : '';     
            });
        }
        lhy_updateResetButtonUI(); lhy_applyOrientationLogic();
    }

// [도우미 함수 1: 소리 재생]
function lhy_playDingDongSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, duration, time) => {
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }, time);
    };
    // 딩동~ 3번 (딩 880Hz, 동 659Hz)
    for(let i=0; i<3; i++) {
        playTone(880, 0.3, i * 1000);     // 딩
        playTone(659, 0.3, i * 1000 + 400); // 동
    }
}

// [도우미 함수 2: 네온사인 효과]
function lhy_triggerNeonEffect(memberId) {
    // memberId를 가진 요소를 찾아 클래스 추가
    const targetEl = document.querySelector(`[data-id="${memberId}"]`) || 
                     document.querySelector(`.player[data-name*="${memberId}"]`); 
    if (targetEl) {
        targetEl.classList.add('neon-active');
        setTimeout(() => targetEl.classList.remove('neon-active'), 5000); // 5초 후 제거
    }
}

function lhy_dominoShiftSystem() {
    // _260626-4
    if (isManualMode) {
        let emptyCourtSlots = [];
        for (let i = 1; i <= 6; i++) {
            if (DB.config.c[i-1]) {
                let isCourtEmpty = posOrder.every(p => boardState[`c${i}-${p}`] === null);
                if (isCourtEmpty) emptyCourtSlots.push(`c${i}`);
            }
        }
        
        let fullWaitTeams = [];
        for (let w = 1; w <= 6; w++) {
            if (DB.config.w[w-1]) {
                let isWaitFull = posOrder.every(p => boardState[`w${w}-${p}`] !== null);
                if (isWaitFull) fullWaitTeams.push(`w${w}`);
            }
        }
        
        let moves = Math.min(emptyCourtSlots.length, fullWaitTeams.length);
        let allMovedMemberIds = []; 

        for(let i=0; i<moves; i++) {
            let tCourt = emptyCourtSlots[i]; 
            let sWait = fullWaitTeams[i];

            posOrder.forEach(p => {
                const memberId = boardState[`${sWait}-${p}`];
                boardState[`${tCourt}-${p}`] = memberId;
                boardState[`${sWait}-${p}`] = null;
                
                if (memberId) {
                    allMovedMemberIds.push(memberId);
                }
            });
        }

        // --- 알림 로직: 메시지 없이 소리와 효과만 ---
        if (allMovedMemberIds.length > 0) {
            lhy_playDingDongSound(); // 소리는 그대로 유지
            allMovedMemberIds.forEach(id => lhy_triggerNeonEffect(id)); // 효과만 적용
        }
        // ------------------------------------------
        
        lhy_compactWaitSlots(); 
        lhy_renderBoardFromState(); 
        lhy_updateResetButtonUI(); 
        lhy_applyOrientationLogic();
        lhy_syncToFirebase();
        return;
    }

    lhy_compactWaitSlots(); lhy_rotationalMatchEngine();
}

        // Firebase에서 초기 상태 불러오기 및 리스너 등록
        database.ref('appData').on('value', (snapshot) => {
            if(isSyncing) return; // 자기가 보낸 데이터로 인한 루프 방지
            const data = snapshot.val();
            if (data) {
                if (data.DB) DB = data.DB;
                if (data.boardState) boardState = data.boardState;
                lhy_renderBoardFromState();
                try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch(e){}
                lhy_updateResetButtonUI();
            } else {
                // 데이터가 비어있으면 초기화 세팅 후 푸시
                lhy_loadDefaultDB();
                for(let i=1; i<=6; i++) { posOrder.forEach(p => { boardState[`c${i}-${p}`] = null; boardState[`w${i}-${p}`] = null; }); }
                lhy_syncToFirebase();
            }
        });

        // 글로벌 알림 이벤트 수신기 초기화
        initGlobalNotifications();
// 출석(1클릭)/귀가(2클릭) 구분 이벤트 변수
        let clickTimer = null; 

        document.addEventListener('click', function(e) {
            // 드래그 중이거나 관리자 모드인 경우 차단
            if (typeof isLongClicked !== 'undefined' && isLongClicked) return;
            if (typeof isListDragging !== 'undefined' && isListDragging) return;

            const playerCard = e.target.closest('.player');
            if (playerCard) {
                // 선택(is-sel) 로직은 그대로 유지
                if (playerCard.classList.contains('is-sel')) {
                    playerCard.classList.remove('is-sel');
                    const memberId = playerCard.dataset.id;
                    selectedPopIds = selectedPopIds.filter(id => id !== memberId);
                    if (typeof lhy_updateGroupDragBtnPosition === 'function') lhy_updateGroupDragBtnPosition();
                    return;
                }

                if (playerCard.closest('#ui-list')) {
                    if (typeof isAdminMode !== 'undefined' && isAdminMode) { alert("관리자 모드 중에는 작동하지 않습니다."); return; }

                    const memberId = playerCard.dataset.id;
                    const m = DB.members.find(x => x.id === memberId);
                    if (!m) return;

                    // 💡 핵심: 클릭할 때마다 타이머를 확인하여 1클릭인지 2클릭인지 판별
                    if (clickTimer) {
                        // 1. 더블 클릭 감지됨! (이미 타이머가 돌고 있는데 또 클릭함)
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        
                        // [더블 클릭 동작: 귀가 처리]
                        if (m.isAtt) {
                            if (typeof lhy_saveUndoState === 'function') lhy_saveUndoState();
                            m.isAtt = false;
                            delete m.attTime;
                            Object.keys(boardState).forEach(key => { if(boardState[key] === m.id) boardState[key] = null; });
                            if (m.isG) { DB.members = DB.members.filter(x => x.id !== m.id); }
                            sendGlobalNotify(`${m.name}님 귀가하였습니다.`);
                            
                            if (typeof lhy_dominoShiftSystem === 'function') lhy_dominoShiftSystem();
                            if (typeof lhy_applyOrientationLogic === 'function') lhy_applyOrientationLogic();
                            lhy_syncToFirebase();
                        }
                    } else {
                        // 2. 첫 번째 클릭! (0.3초 대기 후 출석 처리 실행)
                        clickTimer = setTimeout(() => {
                            clickTimer = null;
                            
                            // [1클릭 동작: 출석 처리]
                            if (!m.isAtt) {
                                if (typeof lhy_saveUndoState === 'function') lhy_saveUndoState();
                                m.isAtt = true;
                                m.attTime = Date.now();
                                sendGlobalNotify(`${m.name}님 출석하였습니다.`);
                                
                                if (typeof lhy_dominoShiftSystem === 'function') lhy_dominoShiftSystem();
                                if (typeof lhy_applyOrientationLogic === 'function') lhy_applyOrientationLogic();
                                lhy_syncToFirebase();
                            }
                        }, 300); // 0.3초간 기다림 (이 시간 안에 두 번 클릭하면 위의 더블클릭 로직 실행)
                    }
                }
            }
        }, true);

        new Sortable(document.getElementById('ui-list'), { 
            ...dragOpt, sort: true, filter: ".is-not, .is-playing", 
            onAdd: (evt) => { 
                if(evt.item) evt.item.remove(); 
                lhy_syncBoardDOMToState();
                if (!isManualMode) lhy_dominoShiftSystem();
                lhy_syncToFirebase();
            } 
        });
        
        lhy_drawBoard(); lhy_renderBoardFromState(); lhy_updateResetButtonUI(); lhy_applyOrientationLogic();
    }

            if (touch) { if (Math.abs(touch.clientX - touchStartX) > 15 || Math.abs(touch.clientY - touchStartY) > 15) { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } } }
        };
        const endHandler = () => { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } };

        p.addEventListener('mousedown', startHandler); p.addEventListener('touchstart', startHandler, { passive: true });
        p.addEventListener('touchmove', moveHandler, { passive: false }); p.addEventListener('mouseup', endHandler); p.addEventListener('touchend', endHandler);
        p.onclick = (e) => {
            if (typeof isListDragging !== 'undefined' && isListDragging) { e.preventDefault(); e.stopPropagation(); return; }
            if (isLongClicked) { e.preventDefault(); e.stopPropagation(); return; }
        };

        slot.appendChild(p);
    }

    function lhy_renderBoardFromState() {
        const occupancy = {};
        Object.keys(boardState).forEach(key => {
            const container = key.split('-')[0];
            if (!occupancy[container]) occupancy[container] = 0;
            if (boardState[key] !== null) occupancy[container]++;
        });

        Object.keys(boardState).forEach(key => {
            const slot = document.getElementById(key);
            if (slot) {
                slot.innerHTML = '';
                const pid = boardState[key];
                
                if (pid) {
                    const m = DB.members.find(x => x.id === pid);
                    if (m) {
                        lhy_insertPlayerToSlot(slot, m);
                        if (!m.isAtt) { slot.classList.add('is-not-att'); } else { slot.classList.remove('is-not-att'); }
                        const container = key.split('-')[0]; const count = occupancy[container] || 0;
                        slot.classList.remove('slot-many', 'slot-single'); slot.classList.add(count >= 2 ? 'slot-many' : 'slot-single');
                    } 
                }
            }
        });
    }

    function lhy_applyOrientationLogic() {
        const b = document.body; const w = window.innerWidth; const h = window.innerHeight;
        b.style.width = "100%"; b.style.height = "100%"; b.style.transform = "none"; b.classList.remove('real-landscape');
        
        let targetLandscape = false;
        if (rotationState === 'auto') { if (w > h) targetLandscape = true; } 
        else if (rotationState === 'force-landscape') {
            targetLandscape = true;
            if (w < h) { b.style.width = h + "px"; b.style.height = w + "px"; b.style.transform = "rotate(90deg) translate(0, -" + w + "px)"; }
        } else if (rotationState === 'force-portrait') {
            targetLandscape = false;
            if (w > h) { b.style.width = h + "px"; b.style.height = w + "px"; b.style.transform = "rotate(-90deg) translate(-" + h + "px, 0)"; }
        }
        
        if (targetLandscape) b.classList.add('real-landscape');
        const btn = document.getElementById('btn-orient-toggle');
        if (btn) { btn.innerText = targetLandscape ? "가로" : "세로"; }
        requestAnimationFrame(() => { lhy_renderListOnly(targetLandscape); });
    }

    function lhy_renderListOnly(isLandscapeMode) {
        const list = document.getElementById('ui-list'); if (!list) return;
        const count = DB.members.length; let cols = 5;
        if (!isLandscapeMode) { if(count <= 12) cols = 3; else if(count <= 24) cols = 4; else if(count <= 45) cols = 5; else if(count <= 60) cols = 6; else cols = 8; } 
        else { cols = (count <= 24) ? 4 : 5; }

        const rows = Math.ceil(count / cols);
        list.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; list.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        const playing = Object.values(boardState).filter(id => id !== null);
        list.innerHTML = '';
        
        [...DB.members].sort((a,b) => {
            if (a.isAtt && !b.isAtt) return -1;
            if (!a.isAtt && b.isAtt) return 1;
            if (a.isAtt && b.isAtt) { if ((a.attTime || 0) !== (b.attTime || 0)) return (a.attTime || 0) - (b.attTime || 0); }
            if (a.isG !== b.isG) return b.isG - a.isG;
            return a.name.localeCompare(b.name, 'ko');
        }).forEach(m => {
            const isP = playing.includes(m.id); if (isP) return;

            const sexClass = lhy_getSexClass(m); const pureName = lhy_getPureName(m.name);
            const d = document.createElement('div'); d.className = `player ${m.isAtt ? 'is-att' : 'is-not'} ${sexClass} ${isP ? 'is-playing' : ''}`; d.dataset.id = m.id;
            d.innerHTML = `
                <div class="p-name" style="display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.0; width:100%; height:100%;">
                    <span style="font-weight: 999; font-size: 1.1em; color: inherit;">${pureName}</span>
                    ${m.isAtt ? `
                        <span class="p-cnt" style="font-size: clamp(15px, 1.2vh, 20px); margin-top:2px; font-weight:900; display:flex; gap:8px;">
                            <span style="color: #2563eb; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${m.win || 0}승</span>
                            <span style="color: #e11d48; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${m.lose || 0}패</span>
                        </span>
                    ` : ''}
                </div>
            `;
            
            let touchStartX = 0; let touchStartY = 0;
            const startHandler = (e) => {
                if (typeof isListDragging !== 'undefined' && isListDragging) return;
                isLongClicked = false; const touch = e.touches ? e.touches[0] : e;
                touchStartX = touch.clientX; touchStartY = touch.clientY;
                if (longClickTimer) clearTimeout(longClickTimer);
                longClickTimer = setTimeout(() => {
                    isLongClicked = true; d.classList.toggle('is-sel'); 
                    if (d.classList.contains('is-sel')) { if (!selectedPopIds.includes(m.id)) selectedPopIds.push(m.id); } 
                    else { selectedPopIds = selectedPopIds.filter(id => id !== m.id); }
                    lhy_updateGroupDragBtnPosition(); 
                }, 400); 
            };
            const moveHandler = (e) => {
                const touch = e.touches ? e.touches[0] : null;
                if (touch) { if (Math.abs(touch.clientX - touchStartX) > 15 || Math.abs(touch.clientY - touchStartY) > 15) { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } } }
            };
            const endHandler = () => { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } };

            d.addEventListener('mousedown', startHandler); d.addEventListener('touchstart', startHandler, { passive: true });
            d.addEventListener('touchmove', moveHandler, { passive: false }); d.addEventListener('mouseup', endHandler); d.addEventListener('touchend', endHandler);

            d.onclick = (e) => {
                if (typeof isListDragging !== 'undefined' && isListDragging) { e.preventDefault(); e.stopPropagation(); return; }
                if (isLongClicked) { e.preventDefault(); e.stopPropagation(); return; } 
                
                if (d.classList.contains('is-sel')) { d.classList.remove('is-sel'); selectedPopIds = selectedPopIds.filter(id => id !== m.id); lhy_updateGroupDragBtnPosition(); return; }
                if (isAdminMode) { alert("관리자 모드 중에는 작동하지 않습니다."); return; }
                
                lhy_saveUndoState(); m.isAtt = !m.isAtt;
                
                if (m.isAtt) {
                    m.attTime = Date.now();
                    sendGlobalNotify(`${m.name}님 출석하였습니다.`);
                } else {
                    delete m.attTime;
                    Object.keys(boardState).forEach(key => { if(boardState[key] === m.id) boardState[key] = null; });
                    if (m.isG) { DB.members = DB.members.filter(x => x.id !== m.id); } 
                    sendGlobalNotify(`${m.name}님 귀가하였습니다.`);
                }
                
                lhy_dominoShiftSystem(); lhy_applyOrientationLogic(); lhy_syncToFirebase();
            };
            list.appendChild(d);
        });
        const statEl = document.getElementById('ui-stat');
        if(statEl && !isAdminMode) { statEl.innerText = `${DB.members.filter(m=>m.isAtt).length}/${DB.members.length}`; }
    }

    function lhy_updateResetButtonUI() {
        const btn = document.getElementById('btn-reset-enter'); if (!btn) return;
        let hasPlayers = Object.values(boardState).some(id => id !== null);
        if (!hasPlayers) { btn.innerText = "입장"; btn.style.background = "linear-gradient(180deg, #2ecc71, #27ae60)"; } 
        else { btn.innerText = "초기화"; btn.style.background = "linear-gradient(180deg, #f39c12, #e67e22)"; }
    }

    function lhy_openHelpPop() { 
        document.getElementById('lhy-pop-help').style.display = 'flex'; 
        const firstBtn = document.querySelector('.help-menu-btn'); if (firstBtn) lhy_switchHelpTab(1, firstBtn);
    }
    
    function lhy_closeHelpPop() { document.getElementById('lhy-pop-help').style.display = 'none'; }
    
    function lhy_openMasterPop() { 
        if(!lhy_checkAdminPermission()) return; 
        lhy_renderMasterTable(); lhy_renderRuleButtons(); document.getElementById('lhy-pop-master').style.display = 'flex'; 
    }
    
    function lhy_closeMasterPop() {
        if(confirm("변경된 내용을 저장하시겠습니까?")) {
            lhy_saveUndoState(); lhy_syncInlineInputsToState(); document.getElementById('lhy-pop-master').style.display = 'none'; 
            lhy_dominoShiftSystem(); lhy_syncToFirebase();
        } else { document.getElementById('lhy-pop-master').style.display = 'none'; }
        if (isAdminMode) { lhy_fnToggleAdminMode(); }
    }

    function lhy_syncInlineInputsToState() {
        const tbody = document.getElementById('ui-master-tbody'); if(!tbody) return;
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
            const pid = row.dataset.id; const m = DB.members.find(x => x.id === pid);
            if(m) {
                const nameVal = row.querySelector('.td-name').value.trim(); const sexVal = row.querySelector('.td-sex').value;
                const ageVal = row.querySelector('.td-age').value; const gradeVal = row.querySelector('.td-grade').value; const dateVal = row.querySelector('.td-date').value.trim();
                m.sex = sexVal; m.name = (sexVal === '여' && !nameVal.includes('여')) ? `${nameVal}(여)` : nameVal;
                m.age = ageVal; m.grade = gradeVal; m.joinDate = dateVal || "260101";
            }
        });
    }

    function lhy_renderMasterTable() {
        const tbody = document.getElementById('ui-master-tbody'); tbody.innerHTML = '';
        let sortedMembers = [...DB.members].filter(m => !m.isG).sort((a,b) => a.name.localeCompare(b.name, 'ko'));
        sortedMembers.forEach(m => {
            const tr = document.createElement('tr'); tr.dataset.id = m.id;
            const pureName = lhy_getPureName(m.name); const curDate = m.joinDate || "260101";
            let ageOpts = `<option value="">미선택</option>`;
            for(let a=20; a<=75; a+=5) { ageOpts += `<option value="${a}" ${m.age==a?'selected':''}>${a}세</option>`; }
            let gradeOpts = `<option value="">미선택</option>`;
            const grades = ["D2","D1","C2","C1","B2","B1","A2","A1"];
            grades.forEach(g => { gradeOpts += `<option value="${g}" ${m.grade===g?'selected':''}>${g}</option>`; });
            tr.innerHTML = `
                <td><input type="text" class="td-name" value="${pureName}"></td>
                <td><select class="td-sex"><option value="남" ${m.sex==='남'?'selected':''}>남</option><option value="여" ${m.sex==='여'?'selected':''}>여</option></select></td>
                <td><select class="td-age">${ageOpts}</select></td>
                <td><select class="td-grade">${gradeOpts}</select></td>
                <td><input type="text" class="td-date" value="${curDate}"></td>
                <td><button class="btn-table-kick" onclick="lhy_kickMasterInline('${m.id}')">탈퇴</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    let tempAddType = '';
    function lhy_addMasterDirect(type) {
        tempAddType = type;
        document.getElementById('add-member-title').innerText = type + " 추가";
        const isG = (type === '손님');
        const defaultName = isG ? `손님${DB.members.filter(x=>x.isG).length + 1}` : `신입${DB.members.filter(x=>!x.isG && x.name.includes('신입')).length + 1}`;
        document.getElementById('add-m-name').value = defaultName; document.getElementById('add-m-sex').value = '남';
        document.getElementById('add-m-age').value = ''; document.getElementById('add-m-grade').value = '';
        document.getElementById('lhy-pop-add-member').style.display = 'flex';
    }

    function lhy_confirmAddMember() {
        let nameVal = document.getElementById('add-m-name').value.trim(); let sexVal = document.getElementById('add-m-sex').value;
        let ageVal = document.getElementById('add-m-age').value; let gradeVal = document.getElementById('add-m-grade').value;
        if(!nameVal) { alert("이름을 입력하세요."); return; }
        
        lhy_saveUndoState();
        const isG = (tempAddType === '손님');
        const d = new Date(); const yy = String(d.getFullYear()).substring(2); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
        if (sexVal === '여' && !nameVal.includes('여')) nameVal = `${nameVal}(여)`;
        
        DB.members.push({ 
            id: 'p' + Date.now() + Math.random().toString(36).substr(2, 5), 
            name: nameVal, sex: sexVal, age: ageVal, grade: gradeVal, joinDate: `${yy}${mm}${dd}`, 
            isAtt: true, cnt: 0, win: 0, lose: 0, isG: isG, attTime: Date.now() 
        });
        
        document.getElementById('lhy-pop-add-member').style.display = 'none';
        lhy_dominoShiftSystem(); lhy_applyOrientationLogic(); lhy_syncToFirebase();
        alert(`[${nameVal}] 님이 명단에 추가되었습니다.`);
    }

    function lhy_kickMasterInline(id) {
        const m = DB.members.find(x => x.id === id);
        if(m && confirm(`정말로 [${lhy_getPureName(m.name)}] 회원을 탈퇴 처리하시겠습니까?`)) {
            DB.members = DB.members.filter(x => x.id !== id); lhy_renderMasterTable();
        }
    }

    function lhy_switchHelpTab(tabIndex, btnEl) {
        document.querySelectorAll('.help-menu-btn').forEach(btn => btn.classList.remove('active'));
        btnEl.classList.add('active'); lhy_renderHelpViewer(tabIndex);
    }

    function lhy_renderHelpViewer(tabIndex) {
        const viewer = document.getElementById('help-viewer-content'); const data = HELP_DATA[tabIndex];
        if(!viewer || !data) return;
        let html = `<div class="viewer-title">${data.title}</div><div class="viewer-step-list">`;
        data.steps.forEach((stepText, idx) => { html += `<div class="viewer-step-item"><div class="viewer-step-num">${idx + 1} 단계</div><div class="viewer-step-text">${stepText}</div></div>`; });
        html += `</div>`; viewer.innerHTML = html;
    }

    function lhy_topBtnCancelGame() {
        if (selectedPopIds.length === 0) { alert("선수를 먼저 롱클릭으로 선택해주세요."); return; }
        
        lhy_saveUndoState();
        selectedPopIds.forEach(selId => {
            Object.keys(boardState).forEach(key => { if (boardState[key] === selId) boardState[key] = null; });
            const m = DB.members.find(x => x.id === selId);
            if (m) { m.isAtt = true; } 
        });
        
        selectedPopIds = []; isLongClicked = false; 
        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
        
        lhy_renderBoardFromState(); lhy_dominoShiftSystem();
        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
        
        lhy_updateGroupDragBtnPosition(); lhy_syncToFirebase();
    }

    function lhy_topBtnGoHome() {
        if (selectedPopIds.length === 0) { alert("선수를 먼저 롱클릭으로 선택해주세요."); return; }
        
        lhy_saveUndoState();
        selectedPopIds.forEach(selId => {
            const m = DB.members.find(x => x.id === selId);
            Object.keys(boardState).forEach(key => { if (boardState[key] === selId) boardState[key] = null; });
            
            if (m) {
                if (m.isG) { DB.members = DB.members.filter(x => x.id !== selId); } 
                else { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; delete m.attTime; }
                sendGlobalNotify(`${m.name}님 귀가하였습니다.`);
            }
        });
        
        selectedPopIds = []; isLongClicked = false;
        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
        
        lhy_renderBoardFromState(); lhy_dominoShiftSystem();
        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
        
        lhy_updateGroupDragBtnPosition(); lhy_syncToFirebase();
    }

    function lhy_fnExit(event) {
        if(event) event.stopPropagation(); 
        if(confirm("오늘 모임을 마감하시겠습니까?")) {
            Object.keys(boardState).forEach(key => { boardState[key] = null; });
            DB.members.filter(m => !m.isG).forEach(m => { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; });
            DB.members = DB.members.filter(m => !m.isG);
            DB.config = { c: [true,true,false,false,false,false], w: [true,false,false,false,false,false], matchRule: 'grade' };
            DB.matchHistory = {};
            
            lhy_syncToFirebase();

            lhy_applyOrientationLogic(); lhy_drawBoard(); lhy_renderBoardFromState();
            if (document.fullscreenElement) { document.exitFullscreen(); }
            
            setTimeout(() => {
                document.body.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100vw; background:linear-gradient(135deg, #111, #222); color:#fff; font-family:sans-serif; text-align:center; position:fixed; top:0; left:0; z-index:99999;">
                        <div style="font-size:1.6rem; font-weight:950; color:#2ecc71; margin-bottom:12px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">✓ 오늘 모임 마감 완료</div>
                        <div style="font-size:1rem; color:#ccc; line-height:1.4;">현재 상태가 안전하게 초기화 및 저장되었습니다.<br>이 창(탭)을 닫으시거나 종료하셔도 됩니다.</div>
                    </div>
                `;
            }, 100);
        }
    }

function lhy_autoEntrySystem() {
        let moved = false;
        for(let i=1; i<=6; i++) {
            if(!DB.config.w[i-1]) continue; 
            const waitSlots = [`w${i}-L1`, `w${i}-L2`, `w${i}-R1`, `w${i}-R2`];
            const isFull = waitSlots.every(s => boardState[s] !== null);
            
            if(isFull) {
                let targetCourt = null;
                for(let j=1; j<=6; j++) {
                    if(!DB.config.c[j-1]) continue;
                    const courtSlots = [`c${j}-L1`, `c${j}-L2`, `c${j}-R1`, `c${j}-R2`];
                    const isCourtEmpty = courtSlots.every(s => boardState[s] === null);
                    if(isCourtEmpty) { targetCourt = j; break; }
                }

                if(targetCourt !== null) {
                    const courtSlots = [`c${targetCourt}-L1`, `c${targetCourt}-L2`, `c${targetCourt}-R1`, `c${targetCourt}-R2`];
                    
                    // [수정] 이름을 모으기 위한 배열 선언
                    let assignedNames = []; 

                    waitSlots.forEach((ws, idx) => {
                        boardState[courtSlots[idx]] = boardState[ws];
                        boardState[ws] = null;
                        
                        // [수정] 알림을 즉시 보내지 않고 이름만 배열에 추가
                        const memberId = boardState[courtSlots[idx]];
                        if(memberId) {
                            const m = DB.members.find(x => x.id === memberId);
                            if(m) assignedNames.push(m.name);
                        }
                    });
                    
                    // [수정] 루프가 끝난 후 이름이 있다면 한 번에 알림 전송
                    if(assignedNames.length > 0) {
                        sendGlobalNotify(`${assignedNames.join(', ')}님 코트 ${targetCourt}에 배정되었습니다.`);
                    }
                    
                    moved = true;
                }
            }
        }
        
        if(moved) { lhy_renderBoardFromState(); lhy_dominoShiftSystem(); lhy_syncToFirebase(); }
    }

    function lhy_lockOrientation() {
        if (screen.orientation && typeof screen.orientation.lock === 'function') {
            screen.orientation.lock('landscape').catch(() => {});
        }
    }
    
    window.addEventListener('load', () => { 
        lhy_init(); lhy_lockOrientation(); initGroupDragEvents(); 
    });

    document.addEventListener('touchstart', function() { lhy_lockOrientation(); }, { once: true });

    function lhy_toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => { console.log(`전체화면 오류: ${err.message}`); });
        } else { if (document.exitFullscreen) { document.exitFullscreen(); } }
    }

    // 알림 및 음성 출력 함수 (수정됨: 글로벌 호출 용)
    function lhy_notify(message) {
        // 1. 화면 팝업
        const popup = document.createElement('div');
        popup.style.cssText = "position:fixed; top:20%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#FFD700; padding:20px; border-radius:10px; z-index:99999; font-size:1.3rem; font-weight:bold; box-shadow:0 0 10px rgba(0,0,0,0.5); border:1px solid #b8860b;";
        popup.innerText = message;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 3000);

        // 2. 음성 출력 (TTS) - 한글 지원, 로그인을 통한 최초 클릭 후부터 작동 보장
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(message);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }
    }
