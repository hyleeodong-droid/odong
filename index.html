        .player {

        .lhy-footer-filename { height: 16px; background: #000; color: #777; font-size: 0.65rem; font-weight: bold; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; border-top: 1px solid #222; flex-shrink: 0; width: 100%; box-shadow: inset 0 2px 4px rgba(0,0,0,1); position: relative; z-index: 1000; }

        .lhy-mid-btn-space { width: clamp(50px, 15vw, 85px); display: flex; flex-direction: column; background: linear-gradient(90deg, #cbd5e1, #f8fafc, #cbd5e1); border-left: 1px solid #64748b; border-right: 1px solid #64748b; box-shadow: inset 0 0 6px rgba(0,0,0,0.2); flex-shrink: 0; height: 100%; gap: 6px; padding: 6px; overflow: visible; position: relative; z-index: 10; container-type: size; }
        .lhy-btn-act-end { flex: 1; border: none; font-weight: 950; font-size: clamp(1rem, 25cqh, 2rem); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0; transition: all 0.1s; z-index: 5; }
        
        .A-btn {

                sendGlobalAction([m.id]); lhy_dominoShiftSystem(); lhy_applyOrientationLogic(); lhy_syncToFirebase();
            };
            list.appendChild(d);
        });
        lhy_enforceDragPermissions();

        const statEl = document.getElementById('ui-stat');
        if (statEl) {
            const attCount = DB.members.filter(m => m.isAtt).length;
            const totalCount = DB.members.length;
            const roleStr = isObserverMode ? "관람모드" : (isCurrentUserAdmin ? "관리자" : "일반");
            statEl.innerText = `${roleStr} [${attCount}/${totalCount}]`;
        }
    }

    function lhy_updateResetButtonUI() { const btn = document.getElementById('btn-reset-enter'); if (!btn) return; let hasPlayers = Object.values(boardState).some(id => id !== null); if (!hasPlayers) { btn.innerText = "입장"; btn.style.background = "linear-gradient(180deg, #2ecc71, #27ae60)"; } else { btn.innerText = "초기화"; btn.style.background = "linear-gradient(180deg, #f39c12, #e67e22)"; } }
    function lhy_openHelpPop() { document.getElementById('lhy-pop-help').style.display = 'flex'; const firstBtn = document.querySelector('.help-menu-btn'); if (firstBtn) lhy_switchHelpTab(1, firstBtn); }
    function lhy_closeHelpPop() { document.getElementById('lhy-pop-help').style.display = 'none'; }

    function lhy_syncInlineInputsToState() { const tbody = document.getElementById('ui-master-tbody'); if(!tbody) return; const rows = tbody.querySelectorAll('tr'); rows.forEach(row => { const pid = row.dataset.id; const m = DB.members.find(x => x.id === pid); if(m) { const nameVal = row.querySelector('.td-name').value.trim(); const sexVal = row.querySelector('.td-sex').value; const ageVal = row.querySelector('.td-age').value; const gradeVal = row.querySelector('.td-grade').value; const dateVal = row.querySelector('.td-date').value.trim(); const adminVal = row.querySelector('.td-admin').checked; m.sex = sexVal; m.name = (sexVal === '여' && !nameVal.includes('여')) ? `${nameVal}(여)` : nameVal; m.age = ageVal; m.grade = gradeVal; m.joinDate = dateVal || "260101"; m.isAdmin = adminVal; } }); }
    function lhy_exportMembers() { if (!confirm("현재 회원 명단을 CSV 파일로 내보내시겠습니까?")) return; let csvContent = "이름,성별,나이,등급,입회날짜,관리자\n"; DB.members.filter(m => !m.isG).forEach(m => { const row = [`"${lhy_getPureName(m.name)}"`, m.sex, m.age, m.grade, m.joinDate, m.isAdmin ? 'O' : 'X'].join(","); csvContent += row + "\n"; }); const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,''); link.setAttribute("href", url); link.setAttribute("download", `${dateStr}.csv`); link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link); }
    function lhy_importMembers(event) { const file = event.target.files[0]; if (!file) return; if (!confirm("불러오기를 진행하면 현재 명단이 교체됩니다. 계속하시겠습니까?")) { event.target.value = ''; return; } const reader = new FileReader(); reader.onload = function(e) { try { const text = e.target.result; const rows = text.split('\n'); let newMembers = []; for (let i = 1; i < rows.length; i++) { if (!rows[i].trim()) continue; const cols = rows[i].split(','); if (cols.length < 5) continue; const name = cols[0].replace(/"/g, '').trim(); const sex = cols[1].trim(); const age = cols[2].trim(); const grade = cols[3].trim(); const joinDate = cols[4] ? cols[4].trim() : ''; const adminRaw = cols[5] ? cols[5].trim().toUpperCase() : 'X'; const isAdmin = (adminRaw === 'O' || adminRaw === 'TRUE'); newMembers.push({ id: 'p' + Date.now() + Math.random().toString(36).substr(2, 5) + i, name: (sex === '여' && !name.includes('여')) ? `${name}(여)` : name, sex: sex, age: age, grade: grade, joinDate: joinDate, isAtt: false, cnt: 0, win: 0, lose: 0, isG: false, isAdmin: isAdmin }); } if(newMembers.length > 0) { DB.members = newMembers; lhy_renderMasterTable(); lhy_syncToFirebase(); alert("명단을 성공적으로 불러왔습니다."); } else { alert("가져올 회원 데이터가 없습니다."); } } catch (err) { console.error("CSV 파싱 오류:", err); alert("파일 읽기 오류. 형식을 확인하세요."); } event.target.value = ''; }; reader.readAsText(file, 'EUC-KR'); }
    function lhy_renderMasterTable() {
        const tbody = document.getElementById('ui-master-tbody');
        tbody.innerHTML = '';
        let sortedMembers = [...DB.members].filter(m => !m.isG).sort((a,b) => a.name.localeCompare(b.name, 'ko'));
        
        sortedMembers.forEach(m => {
            const tr = document.createElement('tr');
            tr.id = 'master-row-' + m.id;
            tr.dataset.id = m.id;
            
            const pureName = lhy_getPureName(m.name);
            const curDate = m.joinDate || "260101";
            
            let ageOpts = `<option value="">미선택</option>`;
            for(let a=20; a<=75; a+=5) { 
                ageOpts += `<option value="${a}" ${m.age==a?'selected':''}>${a}세</option>`; 
            }
            
            let gradeOpts = `<option value="">미선택</option>`;
            const grades = ["D2","D1","C2","C1","B2","B1","A2","A1"];
            grades.forEach(g => { 
                gradeOpts += `<option value="${g}" ${m.grade===g?'selected':''}>${g}</option>`; 
            });

            let adminCheck = `<input type="checkbox" class="td-admin" ${m.isAdmin ? 'checked' : ''} style="width:18px; height:18px; cursor:pointer;">`;
            
            tr.innerHTML = `<td><input type="text" class="td-name" value="${pureName}"></td>
                            <td><select class="td-sex"><option value="남" ${m.sex==='남'?'selected':''}>남</option><option value="여" ${m.sex==='여'?'selected':''}>여</option></select></td>
                            <td><select class="td-age">${ageOpts}</select></td>
                            <td><select class="td-grade">${gradeOpts}</select></td>
                            <td><input type="text" class="td-date" value="${curDate}"></td>
                            <td>${adminCheck}</td>
                            <td><button class="btn-table-kick" onclick="lhy_kickMasterInline('${m.id}')">탈퇴</button></td>`;
            
            tbody.appendChild(tr);
        });
    }
    function lhy_addMasterDirect(type) { tempAddType = type; document.getElementById('add-member-title').innerText = type + " 추가"; const isG = (type === '손님'); const defaultName = isG ? `손님${DB.members.filter(x=>x.isG).length + 1}` : `신입${DB.members.filter(x=>!x.isG && x.name.includes('신입')).length + 1}`; document.getElementById('add-m-name').value = defaultName; document.getElementById('add-m-sex').value = '남'; document.getElementById('add-m-age').value = ''; document.getElementById('add-m-grade').value = ''; document.getElementById('lhy-pop-add-member').style.display = 'flex'; }
    function lhy_confirmAddMember() { let nameVal = document.getElementById('add-m-name').value.trim(); let sexVal = document.getElementById('add-m-sex').value; let ageVal = document.getElementById('add-m-age').value; let gradeVal = document.getElementById('add-m-grade').value; if(!nameVal) { alert("이름을 입력하세요."); return; } lhy_saveUndoState(); const isG = (tempAddType === '손님'); const d = new Date(); const yy = String(d.getFullYear()).substring(2); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0'); if (sexVal === '여' && !nameVal.includes('여')) nameVal = `${nameVal}(여)`; DB.members.push({ id: 'p' + Date.now() + Math.random().toString(36).substr(2, 5), name: nameVal, sex: sexVal, age: ageVal, grade: gradeVal, joinDate: `${yy}${mm}${dd}`, isAtt: true, cnt: 0, win: 0, lose: 0, isG: isG, isAdmin: false, attTime: Date.now() }); document.getElementById('lhy-pop-add-member').style.display = 'none'; lhy_dominoShiftSystem(); lhy_applyOrientationLogic(); lhy_syncToFirebase(); alert(`[${nameVal}] 님이 명단에 추가되었습니다.`); }
    function lhy_kickMasterInline(id) { const m = DB.members.find(x => x.id === id); if(m && confirm(`정말로 [${lhy_getPureName(m.name)}] 회원을 탈퇴 처리하시겠습니까?`)) { DB.members = DB.members.filter(x => x.id !== id); lhy_renderMasterTable(); } }
    function lhy_switchHelpTab(tabIndex, btnEl) { document.querySelectorAll('.help-menu-btn').forEach(btn => btn.classList.remove('active')); btnEl.classList.add('active'); lhy_renderHelpViewer(tabIndex); }
    function lhy_renderHelpViewer(tabIndex) { const viewer = document.getElementById('help-viewer-content'); const data = HELP_DATA[tabIndex]; if(!viewer || !data) return; let html = `<div class="viewer-title">${data.title}</div><div class="viewer-step-list">`; data.steps.forEach((stepText, idx) => { html += `<div class="viewer-step-item"><div class="viewer-step-num">${idx + 1} 단계</div><div class="viewer-step-text">${stepText}</div></div>`; }); html += `</div>`; viewer.innerHTML = html; }
    
    function lhy_topBtnCancelGame() {
        if (selectedPopIds.length === 0) {
            alert("선수를 먼저 롱클릭으로 선택해주세요.");
            return;
        }
        lhy_saveUndoState();
        let actionIds = [...selectedPopIds];

            });

                m.isAtt = true;

        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
        lhy_updateGroupDragBtnPosition();

            triggerBlink('player-' + id);
            triggerBlink('list-item-' + id);

    function lhy_topBtnGoHome() {
        if (selectedPopIds.length === 0) {
            alert("선수를 먼저 롱클릭으로 선택해주세요.");
            return;
        }
        
        lhy_saveUndoState();
        let actionIds = [...selectedPopIds];
        
        selectedPopIds.forEach(selId => {
            const m = DB.members.find(x => x.id === selId);
            
            Object.keys(boardState).forEach(key => {
                if (boardState[key] === selId) boardState[key] = null;
            });

            if (m) {
                if (m.isG) {
                    DB.members = DB.members.filter(x => x.id !== selId);
                } else {
                    m.isAtt = false;
                    m.cnt = 0;
                    m.win = 0;
                    m.lose = 0;
                    delete m.attTime;
                }
            }
        });

        sendGlobalAction(actionIds);
        selectedPopIds = [];
        isLongClicked = false;
        
        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
        
        lhy_renderBoardFromState();
        lhy_dominoShiftSystem();
        
        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
        
        lhy_updateGroupDragBtnPosition();
        lhy_syncToFirebase();

        actionIds.forEach(id => {
            triggerBlink('player-' + id);
            triggerBlink('list-item-' + id);
        });

    function lhy_fnExit(event) { 
        if(event) event.stopPropagation(); 
        if(confirm("오늘 모임을 마감하시겠습니까? (출석 기록 및 보드판이 모두 초기화됩니다.)")) { 
            Object.keys(boardState).forEach(key => { boardState[key] = null; }); 
            DB.members.forEach(m => { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; delete m.attTime; }); 
            DB.members = DB.members.filter(m => !m.isG); 
            DB.config = { c: [true,true,false,false,false,false], w: [true,false,false,false,false,false], matchRule: 'grade', isManualMode: false }; 
            isManualMode = false;
            DB.matchHistory = {}; 
            
            lhy_syncToFirebase(); 
            lhy_drawBoard();
            lhy_renderBoardFromState();
            lhy_applyOrientationLogic();
            if (typeof lhy_refreshMenuUI === 'function') lhy_refreshMenuUI();
            
            alert("오늘 모임이 마감되고 모든 회원이 미출석 상태로 초기화되었습니다.");
        } 
    }

// 1. 유틸리티 함수들
    function lhy_autoEntrySystem() { 
        let moved = false; 
        let assignedIds = []; 
        for(let i=1; i<=6; i++) { 
            if(!DB.config.w[i-1]) continue; 
            const waitSlots = [`w${i}-L1`, `w${i}-L2`, `w${i}-R1`, `w${i}-R2`]; 
            const isFull = waitSlots.every(s => boardState[s] !== null); 
            if(isFull) { 
                let targetCourt = null; 
                for(let j=1; j<=6; j++) { 
                    if(!DB.config.c[j-1]) continue; 
                    const courtSlots = [`c${j}-L1`, `c${j}-L2`, `c${j}-R1`, `c${j}-R2`]; 
                    const isCourtEmpty = courtSlots.every(s => boardState[s] === null); 
                    if(isCourtEmpty) { targetCourt = j; break; } 
                } 
                if(targetCourt !== null) { 
                    const courtSlots = [`c${targetCourt}-L1`, `c${targetCourt}-L2`, `c${targetCourt}-R1`, `c${targetCourt}-R2`]; 
                    waitSlots.forEach((ws, idx) => { 
                        boardState[courtSlots[idx]] = boardState[ws]; 
                        boardState[ws] = null; 
                        const memberId = boardState[courtSlots[idx]]; 
                        if(memberId) assignedIds.push(memberId); 
                    }); 
                    moved = true; 
                } 
            } 
        } 
        if(assignedIds.length > 0) { sendGlobalAction(assignedIds); } 
        if(moved) { lhy_renderBoardFromState(); lhy_dominoShiftSystem(); lhy_syncToFirebase(); } 
    }

    function lhy_lockOrientation() { 
        if (screen.orientation && typeof screen.orientation.lock === 'function') { 
            screen.orientation.lock('landscape').catch(() => {}); 
        } 
    }

    function lhy_toggleFullScreen() { 
        if (!document.fullscreenElement) { 
            document.documentElement.requestFullscreen().catch(err => { console.log(`전체화면 오류: ${err.message}`); }); 
        } else { 
            if (document.exitFullscreen) { document.exitFullscreen(); } 
        } 
    }

    // 3. 페이지 초기화 (이벤트 리스너 통합)
    document.addEventListener('DOMContentLoaded', () => {
        lhy_init(); 
        initGroupDragEvents(); 
        if (typeof lhy_lockOrientation === 'function') lhy_lockOrientation();

        const loginSelect = document.getElementById('login-user-select');
        if (loginSelect) {
            loginSelect.addEventListener('change', function() {
                lhy_runAutoAttendance(this.value);
            });
        }
    });

    // 4. 출석 처리 공통 함수
    function lhy_runAutoAttendance(selectedId) {
        if (!selectedId) return;

        if (typeof DB !== 'undefined' && DB.members) {
            const member = DB.members.find(m => m.id === selectedId || m.name === selectedId);
            if (member) {
                console.log("출석 처리 실행:", member.name);
                member.isAtt = true; 
                
                if (typeof lhy_syncToFirebase === 'function') lhy_syncToFirebase();
                if (typeof lhy_renderBoardFromState === 'function') lhy_renderBoardFromState();
            } else {
                console.error("회원 정보를 찾을 수 없습니다:", selectedId);
            }
        }
    }

// [신규/수정 부분] 나가기 및 본인 귀가 기능 통합 처리
    function logoutOrExit() {
        // 1. 관람모드(12) 또는 전체관리자(77)로 로그인한 경우 -> 단순 로그아웃(새로고침)
        if (isObserverMode || loggedInUserId === "ADMIN") {
            if (confirm("로그아웃 하시겠습니까?")) {
                location.reload();
            }
            return;
        }

        // 2. 일반 회원(34) 로그인 상태인 경우 -> 본인 귀가 기능 수행
        if (loggedInUserId) {
            if (confirm("정말로 귀가(운동끝) 처리하시겠습니까?")) {
                lhy_saveUndoState();
                
                // (1) DB 명단에서 본인 출석 상태 해제
                const member = DB.members.find(m => m.id === loggedInUserId);
                if (member) {
                    member.isAtt = false;
                }

                // (2) 보드판(코트 및 대기열)에 본인이 배정되어 있다면 제거
                for (let key in boardState) {
                    if (boardState[key] === loggedInUserId) {
                        boardState[key] = null;
                    }
                }

                // (3) DOM 동기화 및 빈자리 자동 당기기(도미노) 실행
                lhy_syncBoardDOMToState();
                if (typeof lhy_dominoShiftSystem === 'function' && !isManualMode) {
                    lhy_dominoShiftSystem();
                }
                
                // (4) Firebase 서버에 변경 사항 적용
                lhy_syncToFirebase();
                
                alert("귀가 처리가 완료되었습니다. 수고하셨습니다!");
                location.reload(); // 초기 화면(로그인 폼)으로 복귀
            }
        } else {
            location.reload();
        }
    }

    // 6. Observer UI 복구용 함수
    function updateObserverUI(isObserver) {
        const menuGrid = document.getElementById('ui-menu-grid');
        if (!menuGrid) return;
        
        if (isObserver) {
            menuGrid.classList.add('observer-mode');
            document.body.classList.add('mode-observer');
        } else {
            menuGrid.classList.remove('observer-mode');
            document.body.classList.remove('mode-observer');
        }
    }
