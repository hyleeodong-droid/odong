    <style>
        /* ======================================================== */
        /* 1. 공통 기본 디자인 및 변수 */
        /* ======================================================== */
        :root {

        .lhy-hd-btn.admin-mode { background: linear-gradient(180deg, #ff4d4d, #cc0000); color: #fff; border: 1px solid #990000; animation: blinker 1.5s linear infinite; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); }

        .lhy-menu-grid button:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.1); }

        .section-container { height: 50%; display: flex; min-height: 0; border-bottom: 2px solid #000; position: relative; }

        .btn-ctrl { flex: 1; border: 1px solid #000; background: linear-gradient(135deg, #444, #222); cursor: pointer; position: relative; width: calc(100% - 4px); margin: 1px 2px; border-radius: 3px; box-shadow: inset 1px 1px 1px rgba(255,255,255,0.2), 0 1px 3px rgba(0,0,0,0.5); }
        .btn-ctrl.active { background: linear-gradient(135deg, #ffe24d, #FFD700); border: 1px solid #b8860b; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.8), inset -1px -1px 3px rgba(0,0,0,0.2); }
        .btn-ctrl.active::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #000; font-size: 0.75rem; font-weight: 950; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); }
        
        .grid-wrapper { flex: 1; display: grid; gap: 6px; background: #1e293b; padding: 6px; height: 100%; width: 100%; overflow: hidden; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }

            display: flex; align-items: center; justify-content: center; 
            min-height: 0; width: 100%; height: 100%; overflow: hidden; position: relative; 
            container-type: size;
        }

.lhy-menu-grid button {
    white-space: nowrap;      /* 줄바꿈 금지 */
    overflow: hidden;         /* 글자 넘침 방지 */
    display: flex;            /* 글자 중앙 정렬 */
    justify-content: center;
    align-items: center;
    transition: transform 0.1s; /* 부드럽게 축소 */
    transform-origin: center;   /* 중앙 기준으로 축소 */
}

        /* ======================================================== */
        /* 3. 회원 카드 공통 및 상태 디자인 (JS 간섭 배제) */
        /* ======================================================== */
        .player { 
            display: flex; align-items: center; justify-content: center; cursor: move; touch-action: none; position: relative; user-select: none; -webkit-user-select: none; padding: 0 4px;
            border-radius: 8px; width: 100%; height: 100%; min-height: 0;
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
            container-type: size;
            background: transparent !important;
            border: 1px solid rgba(156, 163, 175, 0.6) !important; 
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3) !important;
        }
        .player:active { transform: scale(0.96); box-shadow: 1px 1px 2px rgba(0,0,0,0.4) !important; }

        /* [요청반영] 미출석 카드 디자인 및 선택 상태 */
        .is-sel { 
            background: #ffe033 !important;
            border: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4) !important;
            opacity: 1.0 !important; 
            z-index: 30; 
        }

        /* [요청반영] 미출석 회원 음각 박스 */

            border: 1px dashed #94a3b8 !important; 
        }
        
        /* [요청반영] 미출석 회원 보라색 기울임 텍스트 */
        .is-not .p-name { 
            color: #800080 !important; 
            font-weight: 900 !important; 
            font-style: italic !important; 
            text-shadow: none !important;
        }

        /* 공통 이름 디자인 */
        .p-name {
            flex: 1; min-width: 0;
            background: transparent !important; border: none !important; box-shadow: none !important;
            padding: 0 2px !important; margin: 0 !important;
            font-size: clamp(12px, 50cqh, 45px) !important; 
            font-weight: 999 !important;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.0; letter-spacing: -0.5px !important;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; pointer-events: none;
            position: relative; z-index: 10 !important; 
            text-shadow: 
                -2.5px -2.5px 0 #fff, 2.5px -2.5px 0 #fff, -2.5px 2.5px 0 #fff, 2.5px 2.5px 0 #fff,
                -2.5px 0 0 #fff, 2.5px 0 0 #fff, 0 -2.5px 0 #fff, 0 2.5px 0 #fff,
                0px 3px 5px rgba(0,0,0,0.9);
        }

        .m-sex .p-name { color: var(--p-black); } 
        .m-sex .p-cnt { color: var(--p-black) !important; }
        .f-sex .p-name { color: var(--p-pink) !important; } 
        .f-sex .p-cnt { color: var(--p-pink) !important; }
        .g-sex .p-name { color: var(--p-guest) !important; } 
        .g-sex .p-cnt { color: var(--p-guest) !important; }
        .p-cnt { font-size: clamp(10px, 20cqh, 20px) !important; font-weight: 999; margin-left: 0px; display: inline-block; letter-spacing: -0.5px; text-shadow: 0px 1px 1px rgba(255,255,255,0.8); white-space: nowrap; }

        .grid-wrapper .p-name { font-size: clamp(10px, 12cqi, 20px) !important; }
        .grid-wrapper.few-rows .p-name { font-size: clamp(14px, 40cqh, 30px) !important; }
        .grid-wrapper.single-row .p-name { font-size: clamp(20px, 60cqh, 45px) !important; }
        .grid-wrapper .p-cnt { font-size: clamp(8px, 15cqi, 14px) !important; }

        /* ======================================================== */
        /* 4. 각종 부가 UI 및 버튼들 */
        /* ======================================================== */
        .lhy-footer-filename { height: 16px; background: #000; color: #777; font-size: 0.65rem; font-weight: bold; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; border-top: 1px solid #222; flex-shrink: 0; width: 100%; box-shadow: inset 0 2px 4px rgba(0,0,0,1); }

        .lhy-mid-btn-space { width: clamp(50px, 15vw, 85px); display: flex; flex-direction: column; background: linear-gradient(90deg, #cbd5e1, #f8fafc, #cbd5e1); border-left: 1px solid #64748b; border-right: 1px solid #64748b; box-shadow: inset 0 0 6px rgba(0,0,0,0.2); flex-shrink: 0; height: 100%; gap: 6px; padding: 6px; overflow: visible; position: relative; z-index: 10; container-type: size; }
        .lhy-btn-act-end { flex: 1; border: none; font-weight: 950; font-size: clamp(1rem, 25cqh, 2rem); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0; transition: all 0.1s; z-index: 5; }
        
        .A-btn { 
            background: linear-gradient(180deg, #fffdf0 0%, #FFD700 50%, #b8860b 100%); 
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.8), inset -2px -2px 4px rgba(0,0,0,0.3);

            clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%); 
            width: calc(100% + clamp(20px, 8vw, 60px)); 
            margin-right: calc(clamp(20px, 8vw, 60px) * -1); 
            padding-right: clamp(10px, 4vw, 30px); 
            filter: drop-shadow(-3px 3px 4px rgba(0,0,0,0.7)); 
        }

function lhy_safeLockOrientation() {

let isLandscape = true; // 가로/세로 상태를 저장할 변수 (기본값)
    
    function safeExecute(fn) {

function lhy_toggleManualMode() {
    isManualMode = !isManualMode;
    
    // 데이터 동기화
    lhy_syncBoardDOMToState(); 

    if (isManualMode) {
        // 수동모드: 대기팀을 4팀으로 확장
        DB.config.w = [true, true, true, true, false, false];
        alert("수동 배정 모드가 켜졌습니다.\n기존 배치 데이터는 유지됩니다.");
    } else {
        // [자동모드 전환] 현재 존재하는 대기팀 개수 계산
        let currentWaitCount = 0;
        for (let i = 1; i <= 4; i++) { 
            const slots = [`w${i}-L1`, `w${i}-L2`, `w${i}-R1`, `w${i}-R2`];
            // 해당 대기팀(w1~w4) 중 단 한 명이라도 배정되어 있으면 팀이 있는 것으로 간주
            if (slots.some(s => boardState[s] !== null)) {
                currentWaitCount++;
            }
        }

        // 최소 1팀은 유지하되, 현재 2팀 이상이면 그 개수를 유지
        const targetWaitCount = Math.max(1, currentWaitCount);
        
        // DB.config.w 설정 동적 업데이트
        DB.config.w = [false, false, false, false, false, false];
        for (let i = 0; i < targetWaitCount; i++) {
            DB.config.w[i] = true;
        }

        alert(`자동 배정 모드가 켜졌습니다.\n(대기팀 ${targetWaitCount}팀 유지)`);
        lhy_dominoShiftSystem();
    }

    // ★ UI 업데이트는 여기서 통합 관리 (중복 코드 제거됨)
    lhy_refreshMenuUI();

    // 공통 실행 로직
    lhy_drawBoard(); 
    lhy_renderBoardFromState();
    localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
}
// 모든 메뉴 버튼의 상태를 한 번에 동기화하는 함수
// 1. 글자 폭 자동 조절 함수 (이걸 스크립트 아무 곳에나 추가해 두세요)
function lhy_fitButtonTextWidth() {
    const buttons = document.querySelectorAll('.lhy-menu-grid button');
    buttons.forEach(btn => {
        // 초기화: 원래 크기로 돌려놓고 비교
        btn.style.transform = "scaleX(1)"; 
        
        // 버튼 내부 글자가 버튼 너비보다 크면 축소
        if (btn.scrollWidth > btn.clientWidth) {
            // 여유 공간 4px을 두고 비율 계산
            const scaleFactor = (btn.clientWidth - 4) / btn.scrollWidth;
            // 가로 폭만 줄임
            btn.style.transform = `scaleX(${scaleFactor})`;
        }
    });
}

// 2. 통합 메뉴 관리 함수 (원본에 로직 추가됨)
function lhy_refreshMenuUI() {
    // 1. 자동/수동 버튼 업데이트
    const btnManual = document.getElementById('btn-manual-toggle');
    if (btnManual) {
        btnManual.innerText = isManualMode ? "수동배정" : "자동배정";
        btnManual.style.background = isManualMode ? 
            "linear-gradient(180deg, #d946ef, #a21caf)" : 
            "linear-gradient(180deg, #3b82f6, #1d4ed8)";
        btnManual.style.color = "#fff";
    }

    // 2. 가로/세로 전환 버튼 업데이트
    const btnOrient = document.getElementById('btn-orient-toggle');
    if (btnOrient) {
        btnOrient.innerText = isLandscape ? "세로" : "가로";
        btnOrient.style.background = isLandscape ? 
            "linear-gradient(180deg, #5c0099, #4b0082)" : 
            "linear-gradient(180deg, #99005c, #82004b)";
        btnOrient.style.color = "#fff";
    }

    // [추가] 메뉴가 갱신된 직후 글자 폭 조절 실행
    setTimeout(lhy_fitButtonTextWidth, 10); 
}

function lhy_fitButtonTextWidth() {
    const buttons = document.querySelectorAll('.lhy-menu-grid button');
    buttons.forEach(btn => {
        // 1. 초기화: 우선 원래 크기(1배)로 돌려놓고 비교
        btn.style.transform = "scaleX(1)"; 
        
        // 2. 글자 폭(scrollWidth)이 버튼 폭(clientWidth)보다 크면 축소
        if (btn.scrollWidth > btn.clientWidth) {
            // 여유 공간을 4px 정도 주고 비율 계산
            const scaleFactor = (btn.clientWidth - 4) / btn.scrollWidth;
            // 계산된 비율로 가로 폭만 줄임
            btn.style.transform = `scaleX(${scaleFactor})`;
        }
    });
}

    function lhy_fnToggleOrientationButton() {
        const isPhysicallyLandscape = (window.innerWidth > window.innerHeight);
        if (rotationState === 'auto') {
            rotationState = isPhysicallyLandscape ? 'force-portrait' : 'force-landscape';
        } 
        else {
            rotationState = 'auto'; 
        }
        lhy_applyOrientationLogic();
    }
    
    function lhy_getMatchScore(id1, id2) {
        if (!id1 || !id2) return 0;
        let key = [id1, id2].sort().join('_');
        return DB.matchHistory && DB.matchHistory[key] ? DB.matchHistory[key] : 0;
    }

    function lhy_addMatchHistory(id1, id2) {
        if (!id1 || !id2) return;
        let key = [id1, id2].sort().join('_');
        if (!DB.matchHistory) DB.matchHistory = {};
        DB.matchHistory[key] = (DB.matchHistory[key] || 0) + 1;
    }

    function lhy_setMatchRule(rule) {
        if (!DB.config) DB.config = {};
        DB.config.matchRule = rule;
        lhy_renderRuleButtons();
        lhy_saveUndoState();
        localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
    }

    function lhy_renderRuleButtons() {
        let rule = (DB.config && DB.config.matchRule) ? DB.config.matchRule : 'grade';
        document.querySelectorAll('.rule-btn').forEach(btn => {
            if (btn.dataset.rule === rule) {
                btn.style.background = 'linear-gradient(180deg, #ffe24d, #FFD700)'; btn.style.color = '#000'; btn.style.border = '1px solid #b8860b';
                btn.style.boxShadow = 'inset 1px 1px 2px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.2)';

    function lhy_importMembers(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (!confirm("불러오기를 진행하면 현재 명단이 교체됩니다. 계속하시겠습니까?")) { event.target.value = ''; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n');
            let newMembers = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const cols = rows[i].split(',');
                if (cols.length < 5) continue;
                const name = cols[0].replace(/"/g, '');
                const sex = cols[1]; const age = cols[2]; const grade = cols[3]; const joinDate = cols[4];
                newMembers.push({
                    id: 'p' + Date.now() + Math.random().toString(36).substr(2, 5),
                    name: (sex === '여' && !name.includes('여')) ? `${name}(여)` : name,
                    sex: sex, age: age, grade: grade, joinDate: joinDate, isAtt: false, cnt: 0, win: 0, lose: 0, isG: false
                });
            }
            DB.members = newMembers;
            lhy_renderMasterTable();
            alert("명단을 성공적으로 불러왔습니다.");
            event.target.value = '';
        };
        reader.readAsText(file, 'utf-8');
    }

    function lhy_pickAndPlace4(pool, boardPrefix) {
        let rule = (DB.config && DB.config.matchRule) ? DB.config.matchRule : 'grade';
        if (pool.length < 4) return false;
        
        function getGVal(g) {
            if(!g) return 0;
            let c = g.charAt(0).toUpperCase();
            return {'A':4, 'B':3, 'C':2, 'D':1}[c] || 0;
        }

        let p1 = pool[0], p2 = pool[1], p3 = pool[2], p4 = pool[3];
        let selected = [p1, p2, p3, p4];

        let cases = [
            { t1: [p1, p2], t2: [p3, p4] },
            { t1: [p1, p3], t2: [p2, p4] },
            { t1: [p1, p4], t2: [p2, p3] }
        ];

        let bestCase = null;
        let minPenalty = Infinity;

        cases.forEach(c => {
            let historyPenalty = lhy_getMatchScore(c.t1[0].id, c.t1[1].id) + lhy_getMatchScore(c.t2[0].id, c.t2[1].id);

            let t1Score = getGVal(c.t1[0].grade) + getGVal(c.t1[1].grade);
            let t2Score = getGVal(c.t2[0].grade) + getGVal(c.t2[1].grade);
            let balancePenalty = Math.abs(t1Score - t2Score);

            let totalPenalty = 0;
            if (rule === 'grade') {
                totalPenalty = (balancePenalty * 100) + historyPenalty;
            } else {
                totalPenalty = (historyPenalty * 100) + balancePenalty;
            }

            if (totalPenalty < minPenalty) {
                minPenalty = totalPenalty;
                bestCase = c;
            }
        });

        boardState[`${boardPrefix}-L1`] = bestCase.t1[0].id;
        boardState[`${boardPrefix}-L2`] = bestCase.t1[1].id;
        boardState[`${boardPrefix}-R1`] = bestCase.t2[0].id;
        boardState[`${boardPrefix}-R2`] = bestCase.t2[1].id;
        
        lhy_addMatchHistory(bestCase.t1[0].id, bestCase.t1[1].id);
        lhy_addMatchHistory(bestCase.t2[0].id, bestCase.t2[1].id);
        
        let selectedIds = selected.map(p => p.id);
        for (let i = pool.length - 1; i >= 0; i--) {
            if (selectedIds.includes(pool[i].id)) {
                pool.splice(i, 1);
            }
        }
        return true;
    }

    function lhy_getSortedPool() {
        let playingIds = Object.values(boardState).filter(id => id !== null);
        let pool = DB.members.filter(m => m.isAtt && !playingIds.includes(m.id));
        pool.sort((a, b) => {
            if ((a.attTime || 0) !== (b.attTime || 0)) return (a.attTime || 0) - (b.attTime || 0); 
            if ((a.cnt || 0) !== (b.cnt || 0)) return (a.cnt || 0) - (b.cnt || 0); 
            return a.name.localeCompare(b.name, 'ko');
        });
        return pool;
    }

    function lhy_extractFirstFromWaitlist() {
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        for (let w = 1; w <= 6; w++) {
            if (DB.config.w[w-1]) {
                for (let p of posOrder) {
                    let id = boardState[`w${w}-${p}`];
                    if (id) {
                        boardState[`w${w}-${p}`] = null; 
                        return id;
                    }
                }
            }
        }
        return null;
    }

    function lhy_rebuildTeam(idsArr, boardPrefix) {
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        posOrder.forEach(p => boardState[`${boardPrefix}-${p}`] = null);
        
        if(idsArr.length < 4) {
            idsArr.forEach((id, idx) => { boardState[`${boardPrefix}-${posOrder[idx]}`] = id; });
            return;
        }

        let poolObjects = idsArr.map(id => DB.members.find(m => m.id === id)).filter(m => m !== undefined);
        if(poolObjects.length === 4) {
            lhy_pickAndPlace4(poolObjects, boardPrefix);
        }
    }

    function lhy_rotationalMatchEngine() {
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        let shiftedAny = false;
        
        for (let i = 1; i <= 6; i++) {
            if (DB.config.c[i-1]) {
                let isCourtEmpty = posOrder.every(p => boardState[`c${i}-${p}`] === null);
                if (isCourtEmpty) {
                    for (let w = 1; w <= 6; w++) {
                        if (DB.config.w[w-1]) {
                            let waitCount = posOrder.filter(p => boardState[`w${w}-${p}`] !== null).length;
                            if (waitCount === 4) { 
                                posOrder.forEach(p => {
                                    boardState[`c${i}-${p}`] = boardState[`w${w}-${p}`];
                                    boardState[`w${w}-${p}`] = null;
                                });
                                shiftedAny = true;
                                break;
                            }
                        }
                    }
                }
            }
        }
        
        if (shiftedAny) { lhy_compactWaitSlots(); }

        for (let i = 1; i <= 6; i++) {
            if (DB.config.c[i-1]) {
                let cIds = posOrder.map(p => boardState[`c${i}-${p}`]).filter(id => id !== null);
                if (cIds.length > 0 && cIds.length < 4) {
                    let needed = 4 - cIds.length;
                    for(let k=0; k<needed; k++) {
                        let waitId = lhy_extractFirstFromWaitlist();
                        if(waitId) {
                            cIds.push(waitId);
                        } else {
                            let pool = lhy_getSortedPool();
                            if(pool.length > 0) cIds.push(pool.shift().id);
                        }
                    }
                    lhy_rebuildTeam(cIds, `c${i}`);
                }
            }
        }

        lhy_compactWaitSlots();

        for (let w = 1; w <= 6; w++) {
            if (DB.config.w[w-1]) {
                let wIds = posOrder.map(p => boardState[`w${w}-${p}`]).filter(id => id !== null);
                if (wIds.length > 0 && wIds.length < 4) {
                    let needed = 4 - wIds.length;
                    for(let k=0; k<needed; k++) {
                        let pool = lhy_getSortedPool();
                        if(pool.length > 0) wIds.push(pool.shift().id);
                    }
                    lhy_rebuildTeam(wIds, `w${w}`);
                }
            }
        }

        let pool = lhy_getSortedPool(); 
        const allAreas = [
            ...[1,2,3,4,5,6].map(i => ({ id: `c${i}`, active: DB.config.c[i-1] })),
            ...[1,2,3,4,5,6].map(i => ({ id: `w${i}`, active: DB.config.w[i-1] }))
        ];

        allAreas.forEach(area => {
            if (area.active) {
                let isEmpty = posOrder.every(p => boardState[`${area.id}-${p}`] === null);
                if (isEmpty && pool.length >= 4) {
                    lhy_pickAndPlace4(pool, area.id);
                }
            }
        });
        
        lhy_renderBoardFromState();
        lhy_updateResetButtonUI();
        lhy_applyOrientationLogic();
    }

    function lhy_fnGameEnd(type, idx, winner) {
        if (type !== 'c') return;
        lhy_saveUndoState();
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        
        let pL1 = boardState[`c${idx}-L1`];
        let pL2 = boardState[`c${idx}-L2`];
        let pR1 = boardState[`c${idx}-R1`];
        let pR2 = boardState[`c${idx}-R2`];

        let aTeam = [pL1, pL2].filter(id => id);
        let bTeam = [pR1, pR2].filter(id => id);

        if (winner === 'A') {
            aTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.win = (m.win||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
            bTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.lose = (m.lose||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
        } else if (winner === 'B') {
            aTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.lose = (m.lose||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
            bTeam.forEach(id => { let m = DB.members.find(x => x.id === id); if(m) { m.win = (m.win||0)+1; m.cnt = (m.cnt||0)+1; m.attTime = Date.now(); } });
        }

        posOrder.forEach(p => { boardState[`c${idx}-${p}`] = null; });
        lhy_dominoShiftSystem();
    }

    function lhy_compactWaitSlots() {
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        let activeWaitTeams = [];
        for (let i = 1; i <= 6; i++) {
            if (DB.config.w[i - 1]) {
                let team = posOrder.map(p => boardState[`w${i}-${p}`]);
                if (team.some(id => id !== null)) { activeWaitTeams.push(team); }
                posOrder.forEach(p => { boardState[`w${i}-${p}`] = null; });
            }
        }
        let slotIdx = 1;
        activeWaitTeams.forEach(team => {
            while (slotIdx <= 6 && !DB.config.w[slotIdx - 1]) { slotIdx++; }
            if (slotIdx <= 6) {
                posOrder.forEach((p, idx) => { boardState[`w${slotIdx}-${p}`] = team[idx]; });
                slotIdx++;
            }
        });
    }

    function lhy_syncBoardDOMToState() {
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        for (let i = 1; i <= 6; i++) {
            posOrder.forEach(p => {
                ['c', 'w'].forEach(t => {
                    const slot = document.getElementById(`${t}${i}-${p}`);
                    if (slot && slot.children.length > 0) { boardState[`${t}${i}-${p}`] = slot.children[0].dataset.id; } 
                    else { boardState[`${t}${i}-${p}`] = null; }
                });
            });
        }
        lhy_renderBoardFromState();
        lhy_updateResetButtonUI();
        lhy_applyOrientationLogic();
    }

    function lhy_dominoShiftSystem() {
        if (isManualMode) {
            const posOrder = ['L1', 'L2', 'R1', 'R2'];
            let emptyCourtSlots = [];
            
            for (let i = 1; i <= 6; i++) {
                if (DB.config.c[i-1]) {
                    let isCourtEmpty = posOrder.every(p => boardState[`c${i}-${p}`] === null);
                    if (isCourtEmpty) emptyCourtSlots.push(`c${i}`);
                }
            }
            
            let fullWaitTeams = [];
            for (let w = 1; w <= 6; w++) {
                if (DB.config.w[w-1]) {
                    let isWaitFull = posOrder.every(p => boardState[`w${w}-${p}`] !== null);
                    if (isWaitFull) fullWaitTeams.push(`w${w}`);
                }
            }
            
            let moves = Math.min(emptyCourtSlots.length, fullWaitTeams.length);
            for(let i=0; i<moves; i++) {
                let tCourt = emptyCourtSlots[i];
                let sWait = fullWaitTeams[i];
                
                posOrder.forEach(p => {
                    boardState[`${tCourt}-${p}`] = boardState[`${sWait}-${p}`];
                    boardState[`${sWait}-${p}`] = null;
                });
            }
            
            lhy_compactWaitSlots();
            lhy_renderBoardFromState();
            lhy_updateResetButtonUI();
            lhy_applyOrientationLogic();
            return;
        }

        lhy_compactWaitSlots();
        lhy_rotationalMatchEngine();

    function lhy_getPureName(fullName) {
        if(!fullName) return "";
        let pure = fullName.split(',')[0]; 
        pure = pure.replace(/\(여\)/g, '').replace(/\(남\)/g, ''); 
        return pure.trim();
    }

    function lhy_getSexClass(memberObj) {
        if (memberObj.isG) return 'g-sex'; 
        const nameData = memberObj.name || ""; const sexData = memberObj.sex || "";
        if (sexData === '여' || nameData.includes('여')) return 'f-sex';
        return 'm-sex';
    }

    function lhy_init() {
        const d = new Date(); const days = ['일','월','화','수','목','금','토'];
        const yy = String(d.getFullYear()).substring(2); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
        document.getElementById('ui-date').innerText = `${yy}/${mm}/${dd}/${days[d.getDay()]}`;
        
        const saved = localStorage.getItem('lhy_v260520_storage');

        if(saved) {
            try {
                DB = JSON.parse(saved);
                if(!DB.members || !DB.members.length) { lhy_loadDefaultDB(); }
                if(!DB.config || !DB.config.c || DB.config.c.length < 6) { 
                    DB.config = { c: [true,true,false,false,false,false], w: [true,false,false,false,false,false], matchRule: 'grade' }; 
                }
                DB.members.filter(m => !m.isG).forEach(m => { 
                    if(!m.joinDate) m.joinDate = "260101"; 
                    if(m.win === undefined) m.win = 0;
                    if(m.lose === undefined) m.lose = 0;
                });
                if(!DB.matchHistory) DB.matchHistory = {};
                if(!DB.config.matchRule) DB.config.matchRule = 'grade';
            } catch(e) { lhy_loadDefaultDB(); }
        } else { lhy_loadDefaultDB(); }
        
        const posOrder = ['L1', 'L2', 'R1', 'R2'];
        const savedBoard = localStorage.getItem('lhy_v260520_boardState');
        if(savedBoard) {
            try { boardState = JSON.parse(savedBoard); } catch(e) {
                for(let i=1; i<=6; i++) { posOrder.forEach(p => { boardState[`c${i}-${p}`] = null; boardState[`w${i}-${p}`] = null; }); }
            }
        } else {
            for(let i=1; i<=6; i++) { posOrder.forEach(p => { boardState[`c${i}-${p}`] = null; boardState[`w${i}-${p}`] = null; }); }
        }

        let isNewSession = !sessionStorage.getItem('hwamok_session_v19');
        if (isNewSession) {
            DB.members.forEach(m => { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; delete m.attTime; });
            DB.members = DB.members.filter(m => !m.isG);
            DB.config.c = [true, true, false, false, false, false];
            DB.config.w = [true, false, false, false, false, false];
            DB.config.matchRule = 'grade';
            Object.keys(boardState).forEach(key => { boardState[key] = null; });
            DB.matchHistory = {};
            sessionStorage.setItem('hwamok_session_v19', 'true');
            localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
            localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
        }

        const validIds = new Set(DB.members.map(m => m.id));
        Object.keys(boardState).forEach(key => {
            if (boardState[key] && !validIds.has(boardState[key])) { boardState[key] = null; }
        });

        window.addEventListener('beforeunload', () => {
            localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
            localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
        });

        // 명단 리스트 초기화
        new Sortable(document.getElementById('ui-list'), { 
            ...dragOpt, 
            sort: true, 
            filter: ".is-not, .is-playing", 
            onAdd: (evt) => { 
                if(evt.item) evt.item.remove(); 
                lhy_syncBoardDOMToState();
                if (!isManualMode) lhy_dominoShiftSystem(); 
            } 
        });
        
        lhy_drawBoard(); lhy_renderBoardFromState(); lhy_updateResetButtonUI(); 
    }

    // [요청반영 3] 코트/대기팀 수 줄일 때 인원 자동 복귀 기능
    function toggleUnit(t, i) { 
        lhy_saveUndoState();

        // 코트/대기를 끄는 경우(수량이 줄어드는 경우)

    function lhy_drawBoard() {
        const cG = document.getElementById('ui-court-grid'), wG = document.getElementById('ui-wait-grid');
        const cC = document.getElementById('ctrl-c'), wW = document.getElementById('ctrl-w');
        cG.innerHTML = ''; wG.innerHTML = ''; cC.innerHTML = ''; wW.innerHTML = '';
        
        let actC = 0, actW = 0;
        for(let i=1; i<=6; i++) { if(DB.config.c[i-1]) actC++; if(DB.config.w[i-1]) actW++; }

        let cCols = (actC <= 2) ? 1 : 2;
        let cRows = (actC <= 2) ? Math.max(1, actC) : Math.ceil(actC / 2);
        cG.style.gridTemplateColumns = `repeat(${cCols}, 1fr)`;
        cG.style.gridTemplateRows = `repeat(${cRows}, 1fr)`;
        cG.className = `grid-wrapper layout-c${cCols}-r${cRows} ${actC <= 2 ? 'few-rows' : ''} ${actC === 1 ? 'single-row' : ''}`;

        let wCols = (actW <= 2) ? 1 : 2;
        let wRows = (actW <= 2) ? Math.max(1, actW) : Math.ceil(actW / 2);
        wG.style.gridTemplateColumns = `repeat(${wCols}, 1fr)`;
        wG.style.gridTemplateRows = `repeat(${wRows}, 1fr)`;
        wG.className = `grid-wrapper layout-c${wCols}-r${wRows} ${actW <= 2 ? 'few-rows' : ''} ${actW === 1 ? 'single-row' : ''}`;

        for(let i=1; i<=6; i++) {
            ['c','w'].forEach(t => {
                const isAct = DB.config[t][i-1];
                const b = document.createElement('button');
                b.className = `btn-ctrl ${isAct ? 'active' : ''}`;
                b.onclick = () => toggleUnit(t, i);
                (t === 'c' ? cC : wW).appendChild(b);

                if (isAct) {
                    const d = document.createElement('div');
                    d.className = `lhy-unit ${t==='c'?'u-c':'u-w'}`; d.id = `unit-${t}${i}`;
                    if(t === 'c') {
                        d.innerHTML = `<div class="lhy-label">${t.toUpperCase()}${i}</div>
                                        <div class="lhy-team A-team"><div class="lhy-slot" id="${t}${i}-L1"></div><div class="lhy-slot" id="${t}${i}-L2"></div></div>
                                        <div class="lhy-mid-btn-space">
                                            <button class="lhy-btn-act-end A-btn" onclick="lhy_fnGameEnd('${t}',${i},'A')">승</button>
                                            <button class="lhy-btn-act-end B-btn" onclick="lhy_fnGameEnd('${t}',${i},'B')">승</button>
                                        </div>
                                        <div class="lhy-team B-team"><div class="lhy-slot" id="${t}${i}-R1"></div><div class="lhy-slot" id="${t}${i}-R2"></div></div>`;
                    } else {
                        d.innerHTML = `<div class="lhy-label">${t.toUpperCase()}${i}</div>
                                        <div class="lhy-team A-team"><div class="lhy-slot" id="${t}${i}-L1"></div><div class="lhy-slot" id="${t}${i}-L2"></div></div>
                                        <div class="lhy-mid-btn-space" style="width:10px; background:#111; border:none; box-shadow:none;"></div>
                                        <div class="lhy-team B-team"><div class="lhy-slot" id="${t}${i}-R1"></div><div class="lhy-slot" id="${t}${i}-R2"></div></div>`;
                    }
                    (t === 'c' ? cG : wG).appendChild(d);
                }
            });
        }
        
        document.querySelectorAll('.lhy-slot').forEach(el => {
            new Sortable(el, { 
                ...dragOpt, 
                onAdd: function(evt) { 
                    let items = evt.items && evt.items.length > 0 ? Array.from(evt.items) : [evt.item];
                    let toSlot = evt.to;
                    let fromList = evt.from;

                    // [요청반영 1] 1개 슬롯에는 1명만 진입하도록 강제 방어
                    if (toSlot.children.length > items.length) { 
                        // 방금 들어온 아이템 외에 이미 다른 회원이 슬롯에 있다면
                        let originalItems = Array.from(toSlot.children).filter(child => !items.includes(child));
                        
                        // 기존에 있던 회원을 출발지로 되돌려 보내 스왑(교환) 처리되도록 함 (항상 1명 유지)
                        originalItems.forEach(orig => fromList.appendChild(orig));
                    }
                    
                    items.forEach(el => el.classList.remove('is-sel'));
                    selectedPopIds = [];
                    lhy_syncBoardDOMToState();
                    if (!isManualMode) lhy_autoEntrySystem();
                } 
            });
        });

    // [이전수정 반영] 인라인 스타일 오염(JS 강제 개입) 제거 후 CSS에 의존하도록 수정한 함수
    function lhy_insertPlayerToSlot(slot, memberObj) {
        if (slot.children.length > 0) return;

        const sexClass = lhy_getSexClass(memberObj);
        const pureName = lhy_getPureName(memberObj.name);
        const isLeft = slot.id.includes('-L');
        const winCount = Number(memberObj.win || 0);
        const loseCount = Number(memberObj.lose || 0);

        const p = document.createElement('div');
        // 여기에 is-not은 절대 넣지 않습니다.
        p.className = `player in-game ${sexClass}`;
        p.dataset.id = memberObj.id;

        // 레이아웃 유지를 위한 최소 인라인 스타일
        Object.assign(p.style, {
            display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100%', height: '100%',
            overflow: 'hidden', boxSizing: 'border-box', padding: '2px', position: 'relative', containerType: 'size', zIndex: 20
        });

        const stats = document.createElement('div');
        Object.assign(stats.style, {
            display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: isLeft ? 'flex-start' : 'flex-end',
            flex: '0 0 auto', width: 'auto', maxWidth: '35%', height: '100%', pointerEvents: 'none', padding: '0 2px',
            fontSize: 'clamp(9px, 35cqh, 14px)', lineHeight: 'normal'
        });

        stats.innerHTML = `
            <span class="stat-item" style="flex: 1; display: flex; align-items: center; color: #2563eb; font-weight: bold; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${winCount}승</span>
            <span class="stat-item" style="flex: 1; display: flex; align-items: center; color: #e11d48; font-weight: bold; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${loseCount}패</span>
        `;

        const nameDiv = document.createElement('div');
        nameDiv.className = "p-name";
        nameDiv.textContent = pureName;

        if (isLeft) { p.append(stats, nameDiv); } else { p.append(nameDiv, stats); }

        let touchStartX = 0; let touchStartY = 0;
        const startHandler = (e) => {
            if (typeof isListDragging !== 'undefined' && isListDragging) return;
            isLongClicked = false; const touch = e.touches ? e.touches[0] : e;
            touchStartX = touch.clientX; touchStartY = touch.clientY;
            
            if (longClickTimer) clearTimeout(longClickTimer);
            longClickTimer = setTimeout(() => {
                isLongClicked = true;
                p.classList.toggle('is-sel'); 
                if (p.classList.contains('is-sel')) {
                    if (!selectedPopIds.includes(memberObj.id)) selectedPopIds.push(memberObj.id);
                } else {
                    selectedPopIds = selectedPopIds.filter(id => id !== memberObj.id);
                }
            }, 400); 
        };
        const moveHandler = (e) => {
            const touch = e.touches ? e.touches[0] : null;
            if (touch) {
                if (Math.abs(touch.clientX - touchStartX) > 6 || Math.abs(touch.clientY - touchStartY) > 6) {
                    if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; }
                }
            }
        };
        const endHandler = () => { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } };

        p.addEventListener('mousedown', startHandler); p.addEventListener('touchstart', startHandler, { passive: true });
        p.addEventListener('touchmove', moveHandler, { passive: false }); p.addEventListener('mouseup', endHandler); p.addEventListener('touchend', endHandler);
        
        p.onclick = (e) => {
            if (typeof isListDragging !== 'undefined' && isListDragging) { e.preventDefault(); e.stopPropagation(); return; }
            if (isLongClicked) { e.preventDefault(); e.stopPropagation(); return; }
            if (p.classList.contains('is-sel')) {
                p.classList.remove('is-sel');
                selectedPopIds = selectedPopIds.filter(id => id !== memberObj.id);
                return;
            }
        };

        slot.appendChild(p);
    }

// _260610-2: 인원수에 따른 동적 스타일 적용 로직 통합
function lhy_renderBoardFromState() {
    // 1. 각 구역(코트/대기열)별 인원수 먼저 계산
    const occupancy = {};
    Object.keys(boardState).forEach(key => {
        const container = key.split('-')[0]; // 'c1', 'wait' 등 추출
        if (!occupancy[container]) occupancy[container] = 0;
        if (boardState[key] !== null) occupancy[container]++;
    });

    // 2. 화면 렌더링
    Object.keys(boardState).forEach(key => {
        const slot = document.getElementById(key);
        if (slot) {
            slot.innerHTML = '';
            const pid = boardState[key];
            
            if (pid) {
                const m = DB.members.find(x => x.id === pid);
                if (m && m.isAtt) {
                    lhy_insertPlayerToSlot(slot, m);
                    
                    // --- [2번 요구사항 구현] ---
                    const container = key.split('-')[0];
                    const count = occupancy[container] || 0;
                    
                    // 기존 클래스 제거 후 상황에 맞는 클래스 부여
                    slot.classList.remove('slot-many', 'slot-single');
                    slot.classList.add(count >= 2 ? 'slot-many' : 'slot-single');
                    
                    // 선택 상태 표시 (기존 유지)
                    if (m.selected) slot.classList.add('selected');
                    else slot.classList.remove('selected');
                } else {
                    boardState[key] = null;
                }
            }
        }
    });
}

            Object.keys(boardState).forEach(key => { if (boardState[key] === selId) boardState[key] = null; });
            const m = DB.members.find(x => x.id === selId);
            if (m) { m.isAtt = true; } 
        });
        
        localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
        localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
        
        selectedPopIds = []; isLongClicked = false; 
        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
        
        lhy_renderBoardFromState(); lhy_dominoShiftSystem();
        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
    }

    function lhy_topBtnGoHome() {
        if (selectedPopIds.length === 0) { alert("선수를 먼저 롱클릭으로 선택해주세요."); return; }
        
        lhy_saveUndoState();
        selectedPopIds.forEach(selId => {
            const m = DB.members.find(x => x.id === selId);
            Object.keys(boardState).forEach(key => { if (boardState[key] === selId) boardState[key] = null; });
            
            if (m) {
                if (m.isG) { DB.members = DB.members.filter(x => x.id !== selId); } 
                else { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; delete m.attTime; }
            }
        });
        
        localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
        localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
        
        selectedPopIds = [];
        document.querySelectorAll('.player').forEach(el => el.classList.remove('is-sel'));
        lhy_syncBoardDOMToState(); lhy_dominoShiftSystem();
        try { lhy_renderListOnly(document.body.classList.contains('real-landscape')); } catch (e) { console.error(e); }
    }

    function lhy_applyOrientationLogic() {
        const b = document.body; const w = window.innerWidth; const h = window.innerHeight;
        
        b.style.width = "100%"; b.style.height = "100%"; b.style.transform = "none"; b.classList.remove('real-landscape');
        
        let targetLandscape = false;
        
        if (rotationState === 'auto') { 
            if (w > h) targetLandscape = true; 
        } 
        else if (rotationState === 'force-landscape') {
            targetLandscape = true;
            if (w < h) { 
                b.style.width = h + "px"; b.style.height = w + "px"; 
                b.style.transform = "rotate(90deg) translate(0, -" + w + "px)"; 
            }
        } 
        else if (rotationState === 'force-portrait') {
            targetLandscape = false;
            if (w > h) { 
                b.style.width = h + "px"; b.style.height = w + "px"; 
                b.style.transform = "rotate(-90deg) translate(-" + h + "px, 0)"; 
            }
        }
        
        if (targetLandscape) b.classList.add('real-landscape');
        
        const btn = document.getElementById('btn-orient-toggle');
        if (btn) { btn.innerText = targetLandscape ? "가로" : "세로"; }
        
        requestAnimationFrame(() => { lhy_renderListOnly(targetLandscape); });
    }

    // [이전 수정 반영] 명단에서 강제 스타일 삭제 후 CSS 클래스로 전환
    function lhy_renderListOnly(isLandscapeMode) {
        const list = document.getElementById('ui-list'); if (!list) return;
        const count = DB.members.length; let cols = 5;
        if (!isLandscapeMode) { if(count <= 12) cols = 3; else if(count <= 24) cols = 4; else if(count <= 45) cols = 5; else if(count <= 60) cols = 6; else cols = 8; } 
        else { cols = (count <= 24) ? 4 : 5; }
        const rows = Math.ceil(count / cols);
        list.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; list.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        
        const playing = Object.values(boardState).filter(id => id !== null);
        list.innerHTML = '';
        
        [...DB.members].sort((a,b) => {
            if (a.isAtt && !b.isAtt) return -1;
            if (!a.isAtt && b.isAtt) return 1;
            if (a.isAtt && b.isAtt) {
                if ((a.attTime || 0) !== (b.attTime || 0)) return (a.attTime || 0) - (b.attTime || 0);
            }
            if (a.isG !== b.isG) return b.isG - a.isG;
            return a.name.localeCompare(b.name, 'ko');
        }).forEach(m => {
            const isP = playing.includes(m.id);
            if (isP) return; 

            const sexClass = lhy_getSexClass(m); const pureName = lhy_getPureName(m.name);
            const d = document.createElement('div'); 
            
            // 인라인 스타일 삭제, 온전히 CSS 클래스로 위임 (is-not)
            d.className = `player ${m.isAtt ? 'is-att' : 'is-not'} ${sexClass}`;
            d.dataset.id = m.id;
            
            d.innerHTML = `
                <div class="p-name" style="display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.0; width:100%; height:100%;">
                    <span style="font-weight: 999; font-size: 1.1em; color: inherit;">${pureName}</span>
                    ${m.isAtt ? `
                        <span class="p-cnt" style="font-size: clamp(15px, 1.2vh, 20px); margin-top:2px; font-weight:900; display:flex; gap:8px;">
                            <span style="color: #2563eb; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${m.win || 0}승</span>
                            <span style="color: #e11d48; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${m.lose || 0}패</span>
                        </span>
                    ` : ''}
                </div>
            `;
            
            let touchStartX = 0; let touchStartY = 0;
            const startHandler = (e) => {
                if (typeof isListDragging !== 'undefined' && isListDragging) return;
                isLongClicked = false; const touch = e.touches ? e.touches[0] : e;
                touchStartX = touch.clientX; touchStartY = touch.clientY;
                if (longClickTimer) clearTimeout(longClickTimer);
                
                longClickTimer = setTimeout(() => {
                    isLongClicked = true;
                    d.classList.toggle('is-sel'); 
                    if (d.classList.contains('is-sel')) {
                        if (!selectedPopIds.includes(m.id)) selectedPopIds.push(m.id);
                    } else {
                        selectedPopIds = selectedPopIds.filter(id => id !== m.id);
                    }
                }, 400); 
            };
            const moveHandler = (e) => {
                const touch = e.touches ? e.touches[0] : null;
                if (touch) {
                    if (Math.abs(touch.clientX - touchStartX) > 6 || Math.abs(touch.clientY - touchStartY) > 6) {
                        if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; }
                    }
                }
            };
            const endHandler = () => { if (longClickTimer) { clearTimeout(longClickTimer); longClickTimer = null; } };

            d.addEventListener('mousedown', startHandler); d.addEventListener('touchstart', startHandler, { passive: true });
            d.addEventListener('touchmove', moveHandler, { passive: false }); d.addEventListener('mouseup', endHandler); d.addEventListener('touchend', endHandler);

            d.onclick = (e) => {
                if (typeof isListDragging !== 'undefined' && isListDragging) { e.preventDefault(); e.stopPropagation(); return; }
                if (isLongClicked) { e.preventDefault(); e.stopPropagation(); return; } 
                
                if (d.classList.contains('is-sel')) {
                    d.classList.remove('is-sel');
                    selectedPopIds = selectedPopIds.filter(id => id !== m.id);
                    return;
                }

                if (isAdminMode) { alert("관리자 모드 중에는 작동하지 않습니다."); return; }
                lhy_saveUndoState(); m.isAtt = !m.isAtt;
                
                if (m.isAtt) {
                    m.attTime = Date.now();
                } else {
                    delete m.attTime;
                    Object.keys(boardState).forEach(key => { if(boardState[key] === m.id) boardState[key] = null; });
                    if (m.isG) { DB.members = DB.members.filter(x => x.id !== m.id); } 
                }
                
                lhy_dominoShiftSystem();
                lhy_applyOrientationLogic(); 
            };
            list.appendChild(d);
        });
        const statEl = document.getElementById('ui-stat');
        if(statEl && !isAdminMode) { statEl.innerText = `${DB.members.filter(m=>m.isAtt).length}/${DB.members.length}`; }
        localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
        localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
    }

    function lhy_fnExit(event) {
        if(event) event.stopPropagation(); 
        if(confirm("오늘 모임을 마감하시겠습니까?")) {
            Object.keys(boardState).forEach(key => { boardState[key] = null; });
            DB.members.filter(m => !m.isG).forEach(m => { m.isAtt = false; m.cnt = 0; m.win = 0; m.lose = 0; });
            DB.members = DB.members.filter(m => !m.isG);
            DB.config = { c: [true,true,false,false,false,false], w: [true,false,false,false,false,false], matchRule: 'grade' };
            DB.matchHistory = {};
            localStorage.setItem('lhy_v260520_storage', JSON.stringify(DB));
            localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
            sessionStorage.removeItem('hwamok_session_v19'); 
            lhy_applyOrientationLogic(); lhy_drawBoard(); lhy_renderBoardFromState();
            if (document.fullscreenElement) { document.exitFullscreen(); }
            
            window.close();
            setTimeout(() => {
                document.body.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100vw; background:linear-gradient(135deg, #111, #222); color:#fff; font-family:sans-serif; text-align:center; position:fixed; top:0; left:0; z-index:99999;">
                        <div style="font-size:1.6rem; font-weight:950; color:#2ecc71; margin-bottom:12px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">✓ 오늘 모임 마감 완료</div>
                        <div style="font-size:1rem; color:#ccc; line-height:1.4;">현재 상태가 안전하게 저장되었습니다.<br>이 창(탭)을 닫으시거나 종료하셔도 됩니다.</div>
                    </div>
                `;
            }, 100);
        }
    }

    function lhy_autoEntrySystem() {
        let moved = false;
        for(let i=1; i<=6; i++) {
            if(!DB.config.w[i-1]) continue; 
            
            const waitSlots = [`w${i}-L1`, `w${i}-L2`, `w${i}-R1`, `w${i}-R2`];
            const isFull = waitSlots.every(s => boardState[s] !== null);
            
            if(isFull) {
                let targetCourt = null;
                for(let j=1; j<=6; j++) {
                    if(!DB.config.c[j-1]) continue;
                    const courtSlots = [`c${j}-L1`, `c${j}-L2`, `c${j}-R1`, `c${j}-R2`];
                    const isCourtEmpty = courtSlots.every(s => boardState[s] === null);
                    if(isCourtEmpty) { targetCourt = j; break; }
                }

                if(targetCourt !== null) {
                    const courtSlots = [`c${targetCourt}-L1`, `c${targetCourt}-L2`, `c${targetCourt}-R1`, `c${targetCourt}-R2`];
                    waitSlots.forEach((ws, idx) => {
                        boardState[courtSlots[idx]] = boardState[ws];
                        boardState[ws] = null;
                    });
                    moved = true;
                }
            }
        }
        
        if(moved) {
            lhy_renderBoardFromState();
            lhy_dominoShiftSystem();
            localStorage.setItem('lhy_v260520_boardState', JSON.stringify(boardState));
        }
    }


    // 화면 자동회전 방지 추가 로직
    function lhy_lockOrientation() {
        // 1. 기능이 존재하는지(undefined가 아닌지) && 함수인지 확인
        if (screen.orientation && typeof screen.orientation.lock === 'function') {
            // 2. 잠금 시도 (에러 발생 시 catch에서 아무것도 하지 않음)
            screen.orientation.lock('landscape').catch(() => {
                // 경고 로그 제거: 에러가 나도 콘솔에 찍히지 않도록 빈 블록 유지
            });
        }
    }
    
    // 초기 실행
    window.addEventListener('load', () => { lhy_lockOrientation(); });
    // 터치 이벤트 발생 시 (사용자 상호작용 후) 다시 시도
    document.addEventListener('touchstart', function() { 
        lhy_lockOrientation(); 
    }, { once: true });

</script>
